<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية عميقة فخمة */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* دفع العناصر للأعلى والمنتصف */
            background: radial-gradient(circle at center, #061124 0%, #020610 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم الرئيسية */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 10;
            padding-top: 3vh; /* حشو علوي لرفع العناصر للأعلى */
            box-sizing: border-box;
        }

        /* 🎨 كانفاس الرسم الخاص بالقلوب والألعاب النارية والتهنئة */
        #main-canvas {
            width: 100%;
            height: 100%;
            max-height: 85vh;
            display: block;
            background: transparent;
            pointer-events: none;
        }

        /* 🎈 البالونات البيضاوية الشفافة الفخمة والسريعة */
        .balloon {
            position: absolute;
            width: 42px;
            height: 56px;
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            bottom: -100px;
            z-index: 2;
            animation: floatUpFast 6s ease-in forwards; /* حركة صعود سريعة وحماسية تبدأ فور انتهاء القلوب */
        }

        /* عصا البالونة الشفافة */
        .balloon::after {
            content: "";
            position: absolute;
            width: 1.2px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            bottom: -30px;
            left: calc(50% - 0.6px);
        }

        /* حركة صعود سريعة ورشيقة */
        @keyframes floatUpFast {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-125vh) rotate(15deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🎨 كانفاس موحد للرسم لضمان الدقة العالية والتزامن -->
        <canvas id="main-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');

        // الحفاظ على دقة الرسم العالية (HD Retina Display) للأجهزة الذكية والكمبيوتر
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 💗 دالة حساب إحداثيات نقاط القلب الخاصة بك
        function heartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)
            };
        }

        // 💗 دالة رسم القلب مع رفع الإحداثيات للأعلى
        function drawHeart(scale, points) {
            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                let a = (i / 628) * Math.PI * 2; // لتوزيع الرسم بالتساوي على المحيط بالكامل
                let p = heartPoint(a);

                // مركز القلوب مرفوع للأعلى (+10) بشكل متناسق وممتاز
                let x = (canvas.width / (window.devicePixelRatio || 1)) / 2 + p.x * scale;
                let y = (canvas.height / (window.devicePixelRatio || 1)) / 2 - p.y * scale + 10;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.strokeStyle = "#ff66cc";
            ctx.lineWidth = 3.5;
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff66cc";
            ctx.stroke();
            ctx.shadowBlur = 0; // تنظيف الـ Shadow لتجنب التأثير على باقي الرسومات
        }

        // --- 🎈 توليد وصعود البالونات البيضاوية الشفافة جداً بشكل سريع ---
        function generateBalloons() {
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.08)', border: 'rgba(255, 102, 179, 0.25)', glow: 'rgba(255, 102, 179, 0.15)' },
                { bg: 'rgba(0, 229, 255, 0.08)', border: 'rgba(0, 229, 255, 0.25)', glow: 'rgba(0, 229, 255, 0.15)' },
                { bg: 'rgba(255, 215, 0, 0.08)', border: 'rgba(255, 215, 0, 0.25)', glow: 'rgba(255, 215, 0, 0.15)' },
                { bg: 'rgba(255, 255, 255, 0.06)', border: 'rgba(255, 255, 255, 0.18)', glow: 'rgba(255, 255, 255, 0.06)' }
            ];

            // نطلق 18 بالونة دفعة واحدة بشكل متسارع وجميل
            for (let i = 0; i < 18; i++) {
                const b = document.createElement('div');
                b.className = 'balloon'; 
                b.style.left = Math.random() * 90 + 'vw';
                // تباعد زمني بسيط للغاية في أجزاء من الثانية لتعطي موجة صعود كثيفة وممتعة فوراً
                b.style.animationDelay = (Math.random() * 2) + 's'; 
                b.style.animationDuration = (Math.random() * 2 + 4.5) + 's'; // سريعة ورشيقة (تصل للقمة خلال 4.5 إلى 6.5 ثانية)
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.2px solid ${theme.border}`;
                b.style.boxShadow = `0 0 12px ${theme.glow}`;
                
                document.body.appendChild(b);
            }
        }

        // --- 🎆 نظام الألعاب النارية مدمج داخل الكانفاس ---
        const particles = [];
        const fireworkColors = ['#ff66b3', '#ffd700', '#00e5ff', '#ffffff'];
        let explosions = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4 + 1.8;
                this.gravity = 0.04;
                this.opacity = 1;
                this.decay = Math.random() * 0.01 + 0.007;
                this.radius = Math.random() * 2.5 + 1;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
            draw(wDpr) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // --- ⏳ نظام التحريك والمؤقتات المتقاطعة ---
        let startTime = null;
        const totalDrawingDuration = 16500; // 16.5 ثانية لرسم الـ 3 قلوب بالكامل بالتساوي
        let showCelebration = false;
        let textOpacity = 0;

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            // تنظيف الكانفاس في كل إطار
            const wDpr = canvas.width / (window.devicePixelRatio || 1);
            const hDpr = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, wDpr, hDpr);

            // تحديد حالة رسم كل قلب (العدد الأقصى للنقاط = 628 لعمل دورة كاملة)
            let p1 = 0, p2 = 0, p3 = 0;

            // 1. القلب الأول (الداخلي الصغير) - يرسم خلال أول 5.5 ثوانٍ
            if (elapsed < 5500) {
                p1 = (elapsed / 5500) * 628;
            } else {
                p1 = 628;
            }

            // 2. القلب الثاني (الأوسط) - يرسم من الثانية 5.5 إلى 11
            if (elapsed >= 5500 && elapsed < 11000) {
                p2 = ((elapsed - 5500) / 5500) * 628;
            } else if (elapsed >= 11000) {
                p2 = 628;
            }

            // 3. القلب الثالث (الخارجي الكبير) - يرسم من الثانية 11 إلى 16.5
            if (elapsed >= 11000 && elapsed < 16500) {
                p3 = ((elapsed - 11000) / 5500) * 628;
            } else if (elapsed >= 16500) {
                p3 = 628;
                if (!showCelebration) {
                    showCelebration = true;
                    triggerCelebrationEvents();
                }
            }

            // رسم القلوب بالترتيب والنسب الدقيقة المتداخلة المرفوعة للأعلى
            if (p1 > 0) drawHeart(5.8, p1);   // القلب الصغير
            if (p2 > 0) drawHeart(8.0, p2);   // القلب الوسط
            if (p3 > 0) drawHeart(10.2, p3);  // القلب الكبير

            // رسم نص التهنئة بمسافة قريبة جداً فوق القلب المرتفع
            if (showCelebration) {
                if (textOpacity < 1) textOpacity += 0.02; // ظهور تدريجي ناعم ومبهر
                ctx.save();
                ctx.globalAlpha = textOpacity;
                ctx.textAlign = "center";
                ctx.font = "bold 30px Arial";
                ctx.fillStyle = "#fff0fa";
                ctx.shadowBlur = 25;
                ctx.shadowColor = "#ff66cc";

                ctx.fillText(
                    "Happy Birthday To Yosi 🎉",
                    wDpr / 2,
                    hDpr / 2 - 225 // الإحداثي الرأسي للنص قريب جداً من القلوب المرفوعة
                );
                ctx.restore();
            }

            // تحديث ورسم الألعاب النارية
            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw(wDpr);
                } else {
                    particles.splice(idx, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        // تشغيل نظام التحريك عند تحميل الصفحة
        requestAnimationFrame(animate);

        // --- 🎇 أحداث الاحتفال فور انتهاء رسم القلوب بالكامل (عند الثانية 16.5) ---
        function triggerCelebrationEvents() {
            const wDpr = canvas.width / (window.devicePixelRatio || 1);
            const hDpr = canvas.height / (window.devicePixelRatio || 1);

            // 1. إطلاق البالونات البيضاوية الشفافة بشكل سريع وحماسي فوراً بالملي ثانية 🎈
            generateBalloons();

            // 2. الانفجار الأول للألعاب النارية في الجانب الأيسر العلوي
            triggerExplosion(wDpr * 0.25, hDpr * 0.26);

            // 3. الانفجار الثاني للألعاب النارية في الجانب الأيمن العلوي بعد ثانية ونصف
            setTimeout(() => {
                triggerExplosion(wDpr * 0.75, hDpr * 0.22);
            }, 1500);
        }

    </script>
</body>
</html>
