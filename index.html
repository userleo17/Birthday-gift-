<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Happy Birthday Yosi</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #fdfbf7; font-family: 'Fredoka', sans-serif;
        overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* Colors */
    :root {
        --green-btn: #78a890;
        --green-hover: #5d8a74;
        --red-btn: #d97373;
        --tear-color: #85C1E9;
    }

    /* Generic UI */
    .btn {
        padding: 15px 35px; border-radius: 30px; border: none; color: white;
        cursor: pointer; font-size: 20px; font-weight: 600; transition: transform 0.2s, background 0.2s;
        margin: 10px; z-index: 100;
    }
    .btn:active { transform: scale(0.95); }
    .btn-green { background: var(--green-btn); }
    .btn-green:hover { background: var(--green-hover); }
    .btn-red { background: var(--red-btn); }

    /* Speech Bubble */
    #speech-bubble {
        position: absolute; top: 15%; background: white; border: 4px solid var(--green-btn);
        padding: 20px 30px; border-radius: 25px; font-size: 22px; font-weight: bold; color: #444;
        max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        z-index: 50; display: none; opacity: 0; transition: opacity 0.3s;
    }
    #speech-bubble::after {
        content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
        border-width: 15px 15px 0; border-style: solid; border-color: var(--green-btn) transparent transparent transparent;
    }

    /* Leo Container & Animations */
    #leo-wrapper {
        position: absolute; bottom: -300px;
        transition: bottom 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.5s, left 1s, right 1s;
        z-index: 10; display: flex; flex-direction: column; align-items: center;
    }
    .leo-slide-up { bottom: 20% !important; }
    .leo-step-back { transform: scale(0.7) translateY(-50px); }
    .leo-peek { bottom: 20% !important; left: -100px; transform: scale(1); }
    .leo-run-away { transform: translateX(200vw); transition: transform 2s; }
    
    .foot-tap { animation: tap 0.4s infinite alternate; }
    @keyframes tap { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    
    .shake { animation: shake 0.5s infinite; }
    @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px) rotate(-5deg);} 75% {transform: translateX(5px) rotate(5deg);} }

    /* Scene Elements */
    #notebook-scene, #canvas-scene, #choice-scene, #cake-scene { display: none; z-index: 20; position: absolute; }
    
    /* Notebook Scene */
    #notebook-scene { top: 40%; display: flex; flex-direction: column; align-items: center; display: none;}
    input[type="text"] {
        padding: 15px; border-radius: 15px; border: 3px solid #ccc; font-size: 20px; text-align: center;
        outline: none; font-family: 'Fredoka', sans-serif; width: 250px;
    }
    #arabic-warning { color: var(--red-btn); font-size: 14px; margin-top: 5px; opacity: 0; transition: opacity 0.3s; }
    
    /* Meow Floating Texts */
    .meow-text {
        position: absolute; font-size: 20px; font-weight: bold; color: #666;
        opacity: 0; animation: floatUpFade 2s forwards; z-index: 5;
    }
    @keyframes floatUpFade { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-40px); } }

    /* Canvas Scene (Hearts, Fireworks, Neon Text) */
    #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: none; pointer-events: none;}
    #neon-text {
        position: absolute; top: 20%; width: 100%; text-align: center;
        font-size: 40px; font-weight: bold; color: #fff;
        text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de, 0 0 30px #ff00de, 0 0 40px #ff00de;
        display: none; z-index: 2;
    }
    .explode-text { animation: explode 0.5s forwards; }
    @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; filter: blur(10px); } }

    /* River of Tears */
    #tear-river {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 0%;
        background-color: var(--tear-color); z-index: 9999; transition: height 4s ease-in;
    }

    /* Buttons Container */
    #btn-container { position: absolute; bottom: 10%; display: flex; gap: 15px; z-index: 100;}
</style>
</head>

<script>
    // --- Global Variables ---
    const bubble = document.getElementById('speech-bubble');
    const leoWrap = document.getElementById('leo-wrapper');
    const mainBtn = document.getElementById('main-btn');
    const btnContainer = document.getElementById('btn-container');
    
    let typeInterval;
    let idleTimeout;
    
    // --- Helper Functions ---
    function setCatState(stateId) {
        const states = ['state-normal', 'state-sweat', 'state-angry', 'state-love', 'state-sad', 'state-apron'];
        states.forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(stateId).style.display = 'block';
        if(stateId === 'state-angry') document.getElementById('angry-foot').classList.add('foot-tap');
        else document.getElementById('angry-foot').classList.remove('foot-tap');
    }

    function showBubble(text, cb) {
        clearInterval(typeInterval);
        bubble.style.display = 'block';
        bubble.style.opacity = '1';
        bubble.innerHTML = '';
        let i = 0;
        typeInterval = setInterval(() => {
            if (i < text.length) { bubble.innerHTML += text.charAt(i); i++; } 
            else { clearInterval(typeInterval); if (cb) cb(); }
        }, 50);
    }

    function hideBubble() { bubble.style.opacity = '0'; setTimeout(() => bubble.style.display = 'none', 300); }

    function updateBtn(text, colorClass, onClick, extraClass='') {
        mainBtn.style.display = 'block';
        mainBtn.innerHTML = text;
        mainBtn.className = `btn ${colorClass} ${extraClass}`;
        mainBtn.onclick = onClick;
    }

    function clearBtns() { btnContainer.innerHTML = ''; }

    function addBtn(text, colorClass, id, onClick) {
        const b = document.createElement('button');
        b.innerHTML = text; b.className = `btn ${colorClass}`; b.id = id; b.onclick = onClick;
        btnContainer.appendChild(b);
    }

    // --- Scene 1: Start ---
    function startSequence() {
        mainBtn.style.display = 'none';
        leoWrap.classList.add('leo-slide-up');
        setTimeout(() => {
            showBubble("Hello! I am Leo, Lama's cat.", () => {
                updateBtn("Hello Leo", "btn-green", giftIntro);
                btnContainer.appendChild(mainBtn);
            });
        }, 1000);
    }

    // --- Scene 2: Gift Intro ---
    function giftIntro() {
        mainBtn.style.display = 'none';
        showBubble("This is a gift for you from her for your birthday", () => {
            updateBtn("Awesome!", "btn-green", notebookScene);
        });
    }

    // --- Scene 3: Notebook & Nickname ---
    function notebookScene() {
        mainBtn.style.display = 'none';
        hideBubble();
        leoWrap.classList.add('leo-step-back');
        
        setTimeout(() => {
            document.getElementById('notebook-scene').style.display = 'flex';
            setupInputCheck();
        }, 500);
    }

    function setupInputCheck() {
        const input = document.getElementById('nickname-input');
        const warn = document.getElementById('arabic-warning');
        const checkBtn = document.getElementById('check-btn');
        input.focus();
        
        resetIdleTimer();

        input.addEventListener('input', (e) => {
            resetIdleTimer();
            leoWrap.style.zIndex = "10";
            
            if (/[\u0600-\u06FF]/.test(input.value)) {
                warn.style.opacity = '1';
                setCatState('state-sweat');
                checkBtn.style.display = 'none';
            } else {
                warn.style.opacity = '0';
                setCatState('state-normal');
                if(input.value.trim().length > 0) checkBtn.style.display = 'block';
                else checkBtn.style.display = 'none';
            }
        });
    }

    function resetIdleTimer() {
        clearTimeout(idleTimeout);
        idleTimeout = setTimeout(() => triggerIdleMeow(), 5000);
    }

    function triggerIdleMeow() {
        leoWrap.style.zIndex = "1";
        setCatState('state-normal');
        let count = 0;
        let meowInt = setInterval(() => {
            if(count >= 3 || document.getElementById('nickname-input').value !== '') { clearInterval(meowInt); return; }
            createMeowText();
            count++;
        }, 1000);
    }

    function createMeowText() {
        const m = document.createElement('div');
        m.className = 'meow-text'; m.innerText = 'Meow...';
        m.style.left = (Math.random() * 100 - 50) + 'px';
        m.style.top = '-20px';
        leoWrap.appendChild(m);
        setTimeout(() => m.remove(), 2000);
    }

    function checkName() {
        clearTimeout(idleTimeout);
        const val = document.getElementById('nickname-input').value.toLowerCase().trim();
        if (val === 'yosi') {
            setCatState('state-love');
            document.getElementById('check-btn').style.display = 'none';
            setTimeout(startBirthdayScene, 2000);
        } else {
            setCatState('state-angry');
        }
    }

    // --- Scene 4: Birthday Canvas (Hearts & Particles) ---
    const canvas = document.getElementById('canvas-container');
    const ctx = canvas.getContext('2d');
    let W, H;
    
    function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function startBirthdayScene() {
        document.getElementById('notebook-scene').style.display = 'none';
        leoWrap.style.display = 'none'; 
        canvas.style.display = 'block';
        
        drawProgressiveHearts(() => {
            document.getElementById('neon-text').style.display = 'block';
            startParticles();
            
            setTimeout(() => {
                document.getElementById('neon-text').classList.add('explode-text');
                createGlitter();
                setTimeout(startPeekScene, 1500);
            }, 5000);
        });
    }

    function drawProgressiveHearts(onComplete) {
        let progress = 0;
        const hearts = [ {s: 15, c: '#ff4d6d'}, {s: 10, c: '#ff758f'}, {s: 5, c: '#ffb3c1'} ];
        let currentHeart = 0;

        function animateHeart() {
            if (currentHeart >= hearts.length) { onComplete(); return; }
            
            ctx.clearRect(0,0,W,H);
            for(let i=0; i<currentHeart; i++) drawHeartPath(W/2, H/2, hearts[i].s, 1, hearts[i].c);
            drawHeartPath(W/2, H/2, hearts[currentHeart].s, progress, hearts[currentHeart].c);
            
            progress += 0.02;
            if (progress >= 1) { progress = 0; currentHeart++; }
            requestAnimationFrame(animateHeart);
        }
        animateHeart();
    }

    function drawHeartPath(x, y, scale, progress, color) {
        ctx.beginPath();
        ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.lineCap = 'round';
        for (let t = 0; t <= Math.PI * 2 * progress; t += 0.05) {
            let px = x + scale * (16 * Math.pow(Math.sin(t), 3));
            let py = y - scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            if (t === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
    }

    let particles = [];
    function startParticles() {
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random() * W, y: H + Math.random() * 200,
                vx: (Math.random() - 0.5) * 2, vy: -(Math.random() * 5 + 3),
                type: Math.random() > 0.5 ? 'firework' : 'balloon',
                color: `hsl(${Math.random()*360}, 100%, 60%)`, alpha: 1
            });
        }
        animateParticles();
    }

    function animateParticles() {
        if(particles.length === 0) return;
        ctx.clearRect(0,0,W,H);
        drawHeartPath(W/2, H/2, 15, 1, '#ff4d6d'); drawHeartPath(W/2, H/2, 10, 1, '#ff758f'); drawHeartPath(W/2, H/2, 5, 1, '#ffb3c1');
        
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            if(p.type === 'balloon') {
                ctx.fillStyle = `rgba(255,255,255,0.4)`; ctx.strokeStyle = p.color;
                ctx.beginPath(); ctx.ellipse(p.x, p.y, 15, 20, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p.x, p.y+20); ctx.lineTo(p.x, p.y+40); ctx.stroke();
            } else {
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            }
        }
        particles = particles.filter(p => p.y > -50);
        requestAnimationFrame(animateParticles);
    }

    function createGlitter() {
        particles = [];
        for(let i=0; i<100; i++) {
            particles.push({
                x: W/2 + (Math.random()-0.5)*300, y: H/2 + (Math.random()-0.5)*300,
                vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 + 1,
                type: 'glitter', alpha: 1
            });
        }
    }

    // --- Scene 5: Peek & Choice ---
    function startPeekScene() {
        document.getElementById('neon-text').style.display = 'none';
        leoWrap.style.display = 'flex';
        leoWrap.classList.remove('leo-step-back');
        leoWrap.classList.add('leo-peek');
        setCatState('state-sad');
        
        showBubble("I made something for you... Do you want to see it?", () => {
            clearBtns();
            addBtn("Yes, I want to see it", "btn-green", "btn-yes", showCakeSequence);
            addBtn("No, I don't want to see it", "btn-red", "btn-no", handleRejection);
        });
    }

    // --- Scene 6A: Yes (Cake) ---
    function showCakeSequence() {
        clearBtns();
        hideBubble();
        leoWrap.classList.remove('leo-peek');
        leoWrap.classList.add('leo-slide-up');
        setCatState('state-apron');
        
        setTimeout(() => {
            addBtn("Blow!", "btn-green shake", "blow-btn", blowCandles);
        }, 5000);
    }

    let candleClicks = 0;
    function blowCandles() {
        candleClicks++;
        document.getElementById(`f${candleClicks}`).style.display = 'none';
        if (candleClicks === 3) {
            clearBtns();
            startParticles();
            setTimeout(() => {
                leoWrap.classList.add('leo-run-away');
                setTimeout(returnAndKiss, 3000);
            }, 2000);
        }
    }

    function returnAndKiss() {
        leoWrap.style.transition = 'none';
        leoWrap.style.transform = 'translateX(-200vw)';
        setCatState('state-normal');
        
        setTimeout(() => {
            leoWrap.style.transition = 'transform 1s, bottom 1s';
            leoWrap.style.transform = 'scale(1.2) translateX(0)';
            
            showBubble("That's all, I wish you a happy year, honey!", () => {
                setTimeout(blowKissAnim, 1000);
            });
        }, 100);
    }

    function blowKissAnim() {
        setCatState('state-love'); 
        const m = document.createElement('div');
        m.innerHTML = '❤️';
        m.style.position = 'absolute'; m.style.fontSize = '40px'; m.style.top = '100px'; m.style.left = '100px';
        m.style.animation = 'floatUpFade 2s forwards';
        leoWrap.appendChild(m);
    }

    // --- Scene 6B: No (Sad -> Tears) ---
    function handleRejection() {
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        
        setCatState('state-sad');
        hideBubble();
        
        setTimeout(() => {
            document.getElementById('sad-tears').style.display = 'block';
            showBubble("Why?", () => {
                btnYes.innerHTML = "Okay, I will see it";
                btnNo.innerHTML = "I told you I don't want to!!!";
                
                btnYes.onclick = () => {
                    document.getElementById('sad-tears').style.display = 'none';
                    showCakeSequence();
                };
                btnNo.onclick = triggerRiverOfTears;
            });
        }, 2000);
    }

    function triggerRiverOfTears() {
        clearBtns();
        hideBubble();
        document.getElementById('sad-tears').style.strokeWidth = "12";
        const river = document.getElementById('tear-river');
        river.style.height = '100%';
    }

</script>
