<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yosi</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #0b132b; /* Dark Blue Night Background */
        font-family: 'Fredoka', sans-serif;
        overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white;
    }

    /* Colors */
    :root {
        --green-btn: #4caf50;
        --green-hover: #43a047;
        --red-btn: #e53935;
        --red-hover: #d32f2f;
        --tear-color: rgba(66, 165, 245, 0.9);
    }

    /* Generic UI */
    .btn {
        padding: 15px 35px; border-radius: 30px; border: none; color: white;
        cursor: pointer; font-size: 20px; font-weight: 600; transition: transform 0.2s, background 0.2s;
        margin: 10px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn:active { transform: scale(0.95); }
    .btn-green { background: var(--green-btn); }
    .btn-green:hover { background: var(--green-hover); }
    .btn-red { background: var(--red-btn); }
    .btn-red:hover { background: var(--red-hover); }

    /* Speech Bubble */
    #speech-bubble {
        position: absolute; top: 20%; background: rgba(255, 255, 255, 0.95); 
        border: 4px solid var(--green-btn); color: #1a1a2e;
        padding: 20px 30px; border-radius: 25px; font-size: 22px; font-weight: bold;
        max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        z-index: 50; display: none; opacity: 0; transition: opacity 0.5s ease-in-out;
    }
    #speech-bubble::after {
        content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
        border-width: 15px 15px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
    }

    /* Leo Container & Animations */
    #leo-wrapper {
        position: absolute; bottom: -350px; 
        transition: bottom 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.8s, left 0.8s, right 0.8s;
        z-index: 10; display: flex; flex-direction: column; align-items: center;
    }
    .leo-slide-up { bottom: 15% !important; }
    .leo-step-back { transform: scale(0.6) translateY(-100px); z-index: 5; }
    .leo-hide { bottom: -350px !important; transition: bottom 0.5s; }
    .leo-push-right { left: auto; right: -200px; bottom: 15%; transform: scale(0.8); }
    .leo-push-in { right: 50px !important; }
    .leo-peek-left { left: -140px; bottom: 15% !important; transform: scale(0.9); }
    .leo-run-away { transform: translateX(150vw); transition: transform 1.5s; }
    .leo-return-center { bottom: 15% !important; left: 50%; transform: translateX(-50%) scale(1.1); transition: transform 1s; }
    
    .foot-tap { animation: tap 0.3s infinite alternate; }
    @keyframes tap { from { transform: translateY(0); } to { transform: translateY(15px); } }
    
    .shake-btn { animation: shake 0.5s infinite; }
    @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px) rotate(-5deg);} 75% {transform: translateX(5px) rotate(5deg);} }

    .peek-shake { animation: peekShake 2s ease-in-out; }
    @keyframes peekShake { 0% {transform: scale(0.6) translateY(-50px);} 20% {transform: scale(0.6) translateY(-120px) rotate(-10deg);} 80% {transform: scale(0.6) translateY(-120px) rotate(10deg);} 100% {transform: scale(0.6) translateY(-100px);} }

    /* Scene Elements */
    #notebook-scene { position: absolute; top: 45%; display: none; flex-direction: column; align-items: center; z-index: 20; }
    input[type="text"] {
        padding: 15px; border-radius: 15px; border: 3px solid #ccc; font-size: 20px; text-align: center;
        outline: none; font-family: 'Fredoka', sans-serif; width: 280px; background: rgba(255,255,255,0.9);
    }
    #arabic-warning { color: var(--red-btn); font-size: 16px; margin-top: 8px; opacity: 0; transition: opacity 0.3s; font-weight: bold;}
    
    /* Meow Text */
    .meow-text {
        position: absolute; font-size: 24px; font-weight: bold; color: #fff;
        opacity: 0; z-index: 30; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        animation: fadeOutUp 2s forwards;
    }
    @keyframes fadeOutUp { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-30px); } }

    /* Canvas Scene */
    #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: block; pointer-events: none; transition: transform 1s ease-in-out;}
    #neon-text {
        position: absolute; top: 15%; width: 100%; text-align: center;
        font-size: 50px; font-weight: bold; color: #fff;
        text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de, 0 0 30px #ff00de, 0 0 40px #ff00de;
        display: none; z-index: 2;
    }
    .explode-text { animation: explode 1s forwards; }
    @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; filter: blur(20px); display:none;} }

    /* River of Tears */
    #tear-river {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 0%;
        background-color: var(--tear-color); z-index: 9999; transition: height 5s ease-in; pointer-events: none;
    }

    /* Buttons Container */
    #btn-container { position: absolute; bottom: 5%; display: flex; gap: 15px; z-index: 100;}
</style>
</head>

<!-- Notebook Scene -->
<div id="notebook-scene">
    <div style="background: white; border: 4px solid #2b2b2b; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; position:relative;">
        <div style="position: absolute; top: 10px; left: 10px; width: 4px; height: 100%; background: #ffb8c8;"></div>
        <h3 style="color:#2b2b2b; margin-top:0; font-family: 'Fredoka', sans-serif;">My Notebook</h3>
        <input type="text" id="nickname-input" placeholder="What is your nickname?" autocomplete="off">
        <div id="arabic-warning">Sorry, English only 😅</div>
    </div>
    <button id="check-btn" class="btn btn-green" onclick="checkName()">Check</button>
</div>

<!-- Buttons Container -->
<div id="btn-container">
    <button id="start-btn" class="btn btn-green shake-btn" onclick="startSequence()">Click Me</button>
</div>

<script>
    const bubble = document.getElementById('speech-bubble');
    const leoWrap = document.getElementById('leo-wrapper');
    const btnContainer = document.getElementById('btn-container');
    const startBtn = document.getElementById('start-btn');
    
    let typeInterval;
    let idleTimeout;

    // --- State Management ---
    function setCatState(stateId) {
        const states = ['state-normal', 'state-sweat', 'state-angry', 'state-love', 'state-sad', 'state-apron'];
        states.forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(stateId).style.display = 'block';
        if(stateId === 'state-angry') document.getElementById('angry-foot').classList.add('foot-tap');
        else document.getElementById('angry-foot').classList.remove('foot-tap');
    }

    function typeText(text, callback) {
        clearInterval(typeInterval);
        bubble.style.display = 'block';
        setTimeout(() => bubble.style.opacity = '1', 50);
        bubble.innerHTML = '';
        let i = 0;
        typeInterval = setInterval(() => {
            if (i < text.length) { bubble.innerHTML += text.charAt(i); i++; } 
            else { clearInterval(typeInterval); if (callback) callback(); }
        }, 50); // Speed of typing
    }

    function hideBubble() { 
        bubble.style.opacity = '0'; 
        setTimeout(() => bubble.style.display = 'none', 500); 
    }

    function updateBtn(text, colorClass, onClick, extraClass='') {
        btnContainer.innerHTML = '';
        const b = document.createElement('button');
        b.innerHTML = text; b.className = `btn ${colorClass} ${extraClass}`; b.onclick = onClick;
        btnContainer.appendChild(b);
    }

    // --- Scene 1: Start ---
    function startSequence() {
        startBtn.style.display = 'none';
        leoWrap.classList.add('leo-slide-up');
        setTimeout(() => {
            typeText("Hello, I’m Leo, Lama’s cat.", () => {
                updateBtn("Hi Leo", "btn-green", sceneGift);
            });
        }, 1000);
    }

    // --- Scene 2: Gift Message ---
    function sceneGift() {
        btnContainer.innerHTML = '';
        typeText("This is a gift from her for your birthday.", () => {
            updateBtn("Awesome!", "btn-green", sceneNotebook);
        });
    }

    // --- Scene 3: Notebook ---
    function sceneNotebook() {
        btnContainer.innerHTML = '';
        hideBubble();
        leoWrap.classList.add('leo-step-back');
        
        setTimeout(() => {
            document.getElementById('notebook-scene').style.display = 'flex';
            setupInputCheck();
        }, 800);
    }

    function setupInputCheck() {
        const input = document.getElementById('nickname-input');
        const warn = document.getElementById('arabic-warning');
        input.focus();
        resetIdleTimer();

        input.addEventListener('input', (e) => {
            resetIdleTimer();
            leoWrap.classList.remove('peek-shake');
            setCatState('state-normal');
            
            if (/[\u0600-\u06FF]/.test(input.value)) {
                warn.style.opacity = '1';
                setCatState('state-sweat');
            } else {
                warn.style.opacity = '0';
            }
        });
    }

    function resetIdleTimer() {
        clearTimeout(idleTimeout);
        idleTimeout = setTimeout(() => triggerIdleMeow(), 5000);
    }

    function triggerIdleMeow() {
        leoWrap.classList.add('peek-shake');
        const m = document.createElement('div');
        m.className = 'meow-text'; m.innerText = 'Meow...';
        m.style.left = (Math.random() * 60 + 20) + '%';
        m.style.top = '10%';
        document.body.appendChild(m);
        setTimeout(() => m.remove(), 2000);
        resetIdleTimer(); // Repeat if still idle
    }

    function checkName() {
        clearTimeout(idleTimeout);
        const val = document.getElementById('nickname-input').value.toLowerCase().trim();
        if (val === 'yosi') {
            setCatState('state-love');
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('arabic-warning').style.opacity = '0';
            setTimeout(startBirthdayScene, 2000);
        } else {
            setCatState('state-angry');
        }
    }

    // --- Scene 4: Birthday Canvas ---
    const canvas = document.getElementById('canvas-container');
    const ctx = canvas.getContext('2d');
    let W, H;
    
    function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function startBirthdayScene() {
        document.getElementById('notebook-scene').style.display = 'none';
        leoWrap.classList.remove('leo-step-back', 'peek-shake');
        leoWrap.classList.add('leo-hide'); // hide Leo for hearts
        
        drawProgressiveHearts(() => {
            document.getElementById('neon-text').style.display = 'block';
            startFireworksAndBalloons();
            
            setTimeout(() => {
                document.getElementById('neon-text').classList.add('explode-text');
                createGlitter();
                setTimeout(scenePeek, 2000);
            }, 6000); // Wait for fireworks to end
        });
    }

    function drawProgressiveHearts(onComplete) {
        let progress = 0;
        const hearts = [ {s: 16, c: '#ff4d6d'}, {s: 11, c: '#ff758f'}, {s: 6, c: '#ffb3c1'} ];
        let currentHeart = 0;

        function animateHeart() {
            if (currentHeart >= hearts.length) { onComplete(); return; }
            
            ctx.clearRect(0,0,W,H);
            for(let i=0; i<currentHeart; i++) drawHeartPath(W/2, H/2, hearts[i].s, 1, hearts[i].c);
            drawHeartPath(W/2, H/2, hearts[currentHeart].s, progress, hearts[currentHeart].c);
            
            progress += 0.015;
            if (progress >= 1) { progress = 0; currentHeart++; }
            requestAnimationFrame(animateHeart);
        }
        animateHeart();
    }

    function drawHeartPath(x, y, scale, progress, color) {
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineCap = 'round';
        for (let t = 0; t <= Math.PI * 2 * progress; t += 0.05) {
            let px = x + scale * (16 * Math.pow(Math.sin(t), 3));
            let py = y - scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            if (t === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
    }

    let particles = [];
    let fireworkCount = 0;
    
    function startFireworksAndBalloons() {
        fireworkCount = 0;
        spawnFirework();
        setTimeout(spawnFirework, 2000); // 2 times only
        
        // Balloons
        for(let i=0; i<15; i++) {
            particles.push({
                x: Math.random() * W, y: H + Math.random() * 300,
                vx: (Math.random() - 0.5), vy: -(Math.random() * 3 + 2),
                type: 'balloon', color: `hsl(${Math.random()*360}, 100%, 70%)`
            });
        }
        animateParticles();
    }

    function spawnFirework() {
        if(fireworkCount >= 2) return;
        fireworkCount++;
        let fx = W/2 + (Math.random()-0.5)*300;
        let fy = H/3 + (Math.random()-0.5)*100;
        for(let i=0; i<40; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 5 + 2;
            particles.push({
                x: fx, y: fy, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
                type: 'firework', color: `hsl(${Math.random()*360}, 100%, 60%)`, life: 1
            });
        }
    }

    function createGlitter() {
        particles = particles.filter(p => p.type !== 'firework' && p.type !== 'balloon');
        for(let i=0; i<80; i++) {
            particles.push({
                x: W/2 + (Math.random()-0.5)*400, y: H/2 + (Math.random()-0.5)*400,
                vx: 0, vy: Math.random() * 1 + 0.5,
                type: 'glitter', life: Math.random()
            });
        }
    }

    function animateParticles() {
        ctx.clearRect(0,0,W,H);
        drawHeartPath(W/2, H/2, 16, 1, '#ff4d6d'); drawHeartPath(W/2, H/2, 11, 1, '#ff758f'); drawHeartPath(W/2, H/2, 6, 1, '#ffb3c1');
        
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            
            if(p.type === 'balloon') {
                ctx.fillStyle = `rgba(255,255,255,0.15)`; ctx.strokeStyle = p.color; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(p.x, p.y, 18, 24, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p.x, p.y+24); ctx.lineTo(p.x, p.y+50); ctx.stroke();
            } else if(p.type === 'firework') {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                p.life -= 0.02; p.vy += 0.1; // gravity
            } else if(p.type === 'glitter') {
                ctx.fillStyle = `rgba(255,255,255,${Math.abs(Math.sin(p.life*10))})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                p.life -= 0.01;
            }
        }
        ctx.globalAlpha = 1;
        particles = particles.filter(p => p.y > -50 && p.life > 0);
        requestAnimationFrame(animateParticles);
    }

    // --- Scene 5: Peek & Push ---
    function scenePeek() {
        // Leo appears right and pushes hearts
        leoWrap.classList.remove('leo-hide');
        leoWrap.classList.add('leo-push-right');
        setCatState('state-normal');
        
        setTimeout(() => {
            leoWrap.classList.add('leo-push-in');
            canvas.style.transform = 'translateX(-50px)'; // Push hearts left
            
            setTimeout(() => {
                leoWrap.classList.remove('leo-push-right', 'leo-push-in');
                leoWrap.classList.add('leo-hide'); // hide fast
                
                setTimeout(() => {
                    leoWrap.classList.remove('leo-hide');
                    leoWrap.classList.add('leo-peek-left');
                    setCatState('state-sad'); // 🥺
                    
                    typeText("I made something for you… Do you want to see it?", () => {
                        btnContainer.innerHTML = '';
                        const btnY = document.createElement('button');
                        btnY.innerHTML = "Yes, I want to see it"; btnY.className = "btn btn-green"; btnY.onclick = sceneCake;
                        const btnN = document.createElement('button');
                        btnN.innerHTML = "No, I don't want to see it"; btnN.className = "btn btn-red"; btnN.id = "no-btn"; btnN.onclick = sceneCry;
                        btnContainer.appendChild(btnY); btnContainer.appendChild(btnN);
                    });
                }, 800);
            }, 800);
        }, 100);
    }

    // --- Scene 6A: Cake ---
    function sceneCake() {
        btnContainer.innerHTML = '';
        hideBubble();
        canvas.style.transform = 'translateX(0)';
        leoWrap.classList.remove('leo-peek-left');
        leoWrap.classList.add('leo-return-center');
        setCatState('state-apron');
        
        setTimeout(() => {
            updateBtn("Blow!", "btn-green shake-btn", blowCandles);
        }, 5000);
    }

    let candleClicks = 0;
    function blowCandles() {
        candleClicks++;
        document.getElementById(`f${candleClicks}`).style.display = 'none';
        if (candleClicks === 3) {
            btnContainer.innerHTML = '';
            spawnFirework(); // Transparent fireworks
            setTimeout(createGlitter, 1000);
            
            setTimeout(() => {
                leoWrap.classList.add('leo-run-away');
                setTimeout(sceneEnd, 3000);
            }, 2000);
        }
    }

    function sceneEnd() {
        leoWrap.style.transition = 'none';
        leoWrap.style.transform = 'translateX(-150vw)';
        setCatState('state-normal');
        
        setTimeout(() => {
            leoWrap.style.transition = 'transform 1.5s ease-out';
            leoWrap.style.transform = 'translateX(-50%) scale(1.2)';
            
            typeText("That’s all. I wish you a happy year, honey.", () => {
                setTimeout(blowKiss, 1000);
            });
        }, 100);
    }

    function blowKiss() {
        setCatState('state-love'); 
        const m = document.createElement('div');
        m.innerHTML = '❤️';
        m.style.position = 'absolute'; m.style.fontSize = '50px'; 
        m.style.top = '120px'; m.style.left = '100px';
        m.style.animation = 'fadeOutUp 2s forwards';
        leoWrap.appendChild(m);
    }

    // --- Scene 6B: Cry ---
    function sceneCry() {
        const btns = btnContainer.querySelectorAll('button');
        
        setCatState('state-sad');
        // Wait 2s before crying and changing buttons
        setTimeout(() => {
            document.getElementById('sad-tears').style.display = 'block';
            typeText("Why?", () => {
                btns[0].innerHTML = "Okay, I'll see it";
                btns[0].onclick = () => {
                    document.getElementById('sad-tears').style.display = 'none';
                    sceneCake();
                };
                
                btns[1].innerHTML = "I said I don't want!!!";
                btns[1].onclick = triggerRiverOfTears;
            });
        }, 2000);
    }

    function triggerRiverOfTears() {
        btnContainer.innerHTML = '';
        hideBubble();
        document.getElementById('sad-tears').style.strokeWidth = "15";
        const river = document.getElementById('tear-river');
        river.style.height = '100%';
    }

</script>
