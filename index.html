<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Yosi</title>
    <style>
        body { margin: 0; background: #01040a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #start-screen { position: absolute; z-index: 1000; cursor: pointer; padding: 20px 40px; background: #ff3366; border-radius: 50px; border: none; color: white; font-size: 1.2rem; }
        canvas { position: absolute; top: 0; left: 0; }
        #msg-container { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 1.8rem; font-weight: bold; pointer-events: none; }
        #bubble { position: absolute; background: white; color: #111; padding: 20px; border-radius: 20px; display: none; max-width: 80%; text-align: center; line-height: 1.6; box-shadow: 0 10px 30px rgba(255,255,255,0.1); font-size: 1.2rem; transform: scale(0); transition: transform 0.5s ease; }
    </style>
</head>
<body>

<button id="start-screen">اضغط هنا لبدء الاحتفال</button>
<div id="msg-container"></div>
<div id="bubble"></div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    document.getElementById('start-screen').onclick = function() {
        this.style.display = 'none';
        startEverything();
    };

    function startEverything() {
        // 1. القلوب (رسم بسيط وسريع)
        ctx.fillStyle = '#ff3366';
        function drawHeart(x, y, s) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x-s, y-s, x-2*s, y+s, x, y+2*s);
            ctx.bezierCurveTo(x+2*s, y+s, x+s, y-s, x, y);
            ctx.fill();
        }
        drawHeart(canvas.width/2, canvas.height/2, 20);

        // 2. التهنئة
        let text = "Happy Birthday To Yosi 🎉";
        let i = 0;
        let interval = setInterval(() => {
            document.getElementById('msg-container').innerText += text[i];
            i++;
            if(i >= text.length) clearInterval(interval);
        }, 100);

        // 3. فقاعة الدردشة بعد 5 ثواني
        setTimeout(() => {
            document.getElementById('msg-container').style.display = 'none';
            ctx.clearRect(0,0, canvas.width, canvas.height);
            let bubble = document.getElementById('bubble');
            bubble.style.display = 'block';
            bubble.style.transform = 'scale(1)';
            
            let fullMsg = "Happy birthday to the person who makes every day brighter 🎉 … Thank you for being my safe place, my supporter, and the kindest person ever .. I hope this year brings you as much happiness as you bring into my life … I love you so much yosi ❤️!";
            let charIndex = 0;
            let typeInterval = setInterval(() => {
                bubble.innerText += fullMsg[charIndex];
                charIndex++;
                if(charIndex >= fullMsg.length) clearInterval(typeInterval);
            }, 50);
        }, 5000);
    }
</script>
</body>
</html>
