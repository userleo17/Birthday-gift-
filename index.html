<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية كحلية عميقة تطابق الصورة بدقة */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #061124 0%, #020610 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم المركزية */
        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            z-index: 10;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 🎂 عبارة التهنئة في الأعلى (مخفية في البداية وتظهر فجأة بوهج نيون قوي) */
        .birthday-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            opacity: 0; /* تبدأ مخفية */
            margin-bottom: 10px;
        }

        /* عند تفعيل الفئة عبر الـ JS بعد انتهاء رسم القلوب */
        .birthday-text.show {
            animation: fadeInNeon 1s ease-out forwards;
        }

        @keyframes fadeInNeon {
            to {
                opacity: 1;
                text-shadow: 
                    0 0 10px #ff66b3,
                    0 0 20px #ff3399,
                    0 0 40px #ff3399;
            }
        }

        /* 💗 حاوية القلوب النيون المتداخلة */
        .hearts-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hearts-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: visible !important; /* لانتشار توهج النيون بدون أي قص */
        }

        /* ستايل مسار القلب المطابق تماماً للصورة المرفقة */
        .heart-path {
            fill: none;
            stroke: #ff66b3; 
            stroke-width: 1.2px; /* نحيف جداً وفخم */
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
            
            /* توهج نيون ناعم ومنتشر بالكامل */
            filter: drop-shadow(0 0 6px rgba(255, 102, 179, 0.95)) 
                    drop-shadow(0 0 18px rgba(255, 51, 153, 0.65))
                    drop-shadow(0 0 28px rgba(255, 51, 153, 0.35));
            
            /* تجهيز أنيميشن الرسم التدريجي البطيء */
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
        }

        /* ⏱️ تراتبية رسم القلوب ببطء شديد من الداخل إلى الخارج */
        
        /* 1. القلب الصغير الداخلي (يرسم ببطء خلال 2.2 ثانية) */
        .heart-inner {
            transform-origin: 50px 52px;
            transform: scale(0.55);
            animation: drawSlowly 2.2s ease-in-out 0.5s forwards;
        }

        /* 2. القلب الوسط (يبدأ رسمه بعد الصغير ويستغرق 2.2 ثانية) */
        .heart-middle {
            transform-origin: 50px 52px;
            transform: scale(0.8);
            animation: drawSlowly 2.2s ease-in-out 2.5s forwards;
        }

        /* 3. القلب الكبير الخارجي (يبدأ رسمه بعد الوسط ويستغرق 2.2 ثانية) */
        .heart-outer {
            transform-origin: 50px 52px;
            transform: scale(1.05);
            animation: drawSlowly 2.2s ease-in-out 4.5s forwards;
        }

        @keyframes drawSlowly {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 🎈 البالونات الشفافة (تظهر وتصعد فقط بعد تفعيل الفئة عبر JS) */
        .balloon {
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            bottom: -120px;
            z-index: 2;
            opacity: 0;
        }

        /* البالونات تبدأ الطيران فور تفعيل الأنيميشن */
        .balloon.fly {
            animation: floatUp 13s linear infinite;
        }

        /* عصا البالونة البيضاء الشفافة */
        .balloon::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 35px;
            background: rgba(255, 255, 255, 0.2);
            bottom: -35px;
            left: calc(50% - 1px);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            5% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(12deg); opacity: 0; }
        }

        /* 🎆 حاوية الألعاب النارية */
        #canvas-fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 📱 متجاوب بالكامل مع الجوال والأيباد والكمبيوتر */
        @media (max-width: 600px) {
            .birthday-text {
                font-size: 1.7rem;
            }
            .hearts-wrapper {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- 🎆 كانفاس الألعاب النارية -->
    <canvas id="canvas-fireworks"></canvas>

    <div class="container">
        <!-- 🎂 عبارة التهنئة (ستظهر لاحقاً) -->
        <h1 id="bday-title" class="birthday-text">Happy Birthday to yosi 🎉</h1>

        <!-- 💗 القلوب النحيفة المطابقة لنسب وأبعاد صورتك تماماً -->
        <div class="hearts-wrapper">
            <svg class="hearts-svg" viewBox="0 0 100 100">
                <!-- القلب الصغير -->
                <path class="heart-path heart-inner" d="M 50,30 C 42,14 18,14 18,42 C 18,65 50,88 50,88 C 50,88 82,65 82,42 C 82,14 58,14 50,30 Z" />
                
                <!-- القلب الوسط -->
                <path class="heart-path heart-middle" d="M 50,30 C 42,14 18,14 18,42 C 18,65 50,88 50,88 C 50,88 82,65 82,42 C 82,14 58,14 50,30 Z" />
                
                <!-- القلب الكبير -->
                <path class="heart-path heart-outer" d="M 50,30 C 42,14 18,14 18,42 C 18,65 50,88 50,88 C 50,88 82,65 82,42 C 82,14 58,14 50,30 Z" />
            </svg>
        </div>
    </div>

    <script>
        // --- 🎈 إعداد وإنشاء البالونات الشفافة جداً ---
        function generateBalloons() {
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.08)', border: 'rgba(255, 102, 179, 0.22)', glow: 'rgba(255, 102, 179, 0.1)' },
                { bg: 'rgba(0, 229, 255, 0.08)', border: 'rgba(0, 229, 255, 0.22)', glow: 'rgba(0, 229, 255, 0.1)' },
                { bg: 'rgba(255, 215, 0, 0.08)', border: 'rgba(255, 215, 0, 0.22)', glow: 'rgba(255, 215, 0, 0.1)' },
                { bg: 'rgba(255, 255, 255, 0.05)', border: 'rgba(255, 255, 255, 0.15)', glow: 'rgba(255, 255, 255, 0.05)' }
            ];

            for (let i = 0; i < 14; i++) {
                const b = document.createElement('div');
                b.className = 'balloon fly'; // إضافة فئة الطيران مباشرة عند الاستدعاء
                b.style.left = Math.random() * 85 + 'vw';
                b.style.animationDelay = (Math.random() * 6) + 's'; 
                b.style.animationDuration = (Math.random() * 5 + 9) + 's';
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.5px solid ${theme.border}`;
                b.style.boxShadow = `0 0 12px ${theme.glow}`;
                
                document.body.appendChild(b);
            }
        }

        // --- 🎆 الألعاب النارية (دائرية ملونة) ---
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const fireworkColors = ['#ff66b3', '#ffd700', '#00e5ff', '#ffffff'];
        let explosions = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2;
                this.gravity = 0.05;
                this.opacity = 1;
                this.decay = Math.random() * 0.01 + 0.008;
                this.radius = Math.random() * 3.5 + 1;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            if (explosions >= 2) return;
            explosions++;
            for (let i = 0; i < 70; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function anim() {
            if (explosions >= 2 && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });
            requestAnimationFrame(anim);
        }

        // --- ⏳ التحكم الزمني الدقيق (تزامن الأحداث بعد اكتمال الرسم) ---
        
        // 1. يبدأ رسم القلوب فوراً عند فتح الصفحة.
        // 2. القلوب الثلاثة تأخذ إجمالاً 6.7 ثانية لترسم بالكامل وبنعومة فائقة.
        // 3. عند الثانية 6.7 تماماً: ينطلق كل شيء بشكل احتفالي مفاجئ!
        
        setTimeout(() => {
            // أ. إظهار نص التهنئة بالنيون
            document.getElementById('bday-title').classList.add('show');
            
            // ب. إطلاق البالونات الشفافة
            generateBalloons();
            
            // جـ. تفجير الألعاب النارية (انفجارين متتاليين وسريعين لإعطاء حركة حية)
            triggerExplosion(window.innerWidth * 0.3, window.innerHeight * 0.35); 
            setTimeout(() => {
                triggerExplosion(window.innerWidth * 0.7, window.innerHeight * 0.3);
            }, 1200);
            
            anim();
        }, 6700); // 6700 ميلي ثانية = 6.7 ثانية (وقت اكتمال رسم القلوب)

    </script>
</body>
</html>
