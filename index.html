<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    body { background-color: #fdfbf7; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; margin: 0; font-family: sans-serif; padding-top: 50px; }
    
    /* فقاعة الكلام في الأعلى */
    #speech { 
        background: white; border: 4px solid #78a890; padding: 30px; border-radius: 30px; 
        margin-bottom: 30px; display: none; text-align: center; max-width: 500px; 
        font-size: 28px; font-weight: bold; color: #444; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    /* القط في المنتصف */
    #leo-container { 
        position: absolute; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%) scale(1.8); 
        z-index: 10; 
        transition: transform 0.5s;
    }
    
    button { padding: 25px 60px; border-radius: 40px; border: none; background: #78a890; color: white; cursor: pointer; font-size: 30px; font-weight: bold; position: absolute; bottom: 50px; }
</style>
</head>
<body>

<div id="speech"></div>

<div id="leo-container">
<svg id="leo" width="260" height="260" viewBox="0 0 260 260">
    <circle cx="130" cy="135" r="85" fill="#ffffff" stroke="#2b2b2b" stroke-width="5"/>
    <path d="M82 66 Q130 38 178 66 Q166 83 150 90 Q130 74 110 90 Q94 84 82 66 Z" fill="#c8c8c8"/>
    <path d="M68 72 L96 28 L118 82 Z" fill="#ffffff" stroke="#2b2b2b" stroke-width="5"/>
    <path d="M81 70 L96 42 L110 73 Z" fill="#ffb8c8"/>
    <path d="M142 82 L164 28 L192 72 Z" fill="#ffffff" stroke="#2b2b2b" stroke-width="5"/>
    <path d="M150 73 L164 42 L179 70 Z" fill="#ffb8c8"/>
    <ellipse id="l-eye" cx="100" cy="125" rx="14" ry="18" fill="#1f1f1f"/>
    <circle cx="96" cy="119" r="4" fill="white"/><circle cx="102" cy="128" r="1.8" fill="white"/>
    <ellipse id="r-eye" cx="160" cy="125" rx="14" ry="18" fill="#1f1f1f"/>
    <circle cx="156" cy="119" r="4" fill="white"/><circle cx="162" cy="128" r="1.8" fill="white"/>
    <ellipse cx="78" cy="155" rx="12" ry="8" fill="#ffb6c1" opacity="0.6"/>
    <ellipse cx="182" cy="155" rx="12" ry="8" fill="#ffb6c1" opacity="0.6"/>
    <path d="M130 145 L122 154 L138 154 Z" fill="#ff8ca8"/>
    <path id="mouth" d="M130 154 Q124 162 118 162 M130 154 Q136 162 142 162" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="72" cy="205" rx="22" ry="16" fill="#ffffff" stroke="#2b2b2b" stroke-width="4"/>
    <circle cx="60" cy="198" r="3.5" fill="#ffb8c8"/><circle cx="68" cy="194" r="3.5" fill="#ffb8c8"/><circle cx="76" cy="194" r="3.5" fill="#ffb8c8"/><circle cx="84" cy="198" r="3.5" fill="#ffb8c8"/>
    <ellipse cx="188" cy="205" rx="22" ry="16" fill="#ffffff" stroke="#2b2b2b" stroke-width="4"/>
    <circle cx="176" cy="198" r="3.5" fill="#ffb8c8"/><circle cx="184" cy="194" r="3.5" fill="#ffb8c8"/><circle cx="192" cy="194" r="3.5" fill="#ffb8c8"/><circle cx="200" cy="198" r="3.5" fill="#ffb8c8"/>
    <line x1="38" y1="145" x2="82" y2="140" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="156" x2="82" y2="156" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="167" x2="82" y2="172" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
    <line x1="178" y1="140" x2="222" y2="145" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
    <line x1="178" y1="156" x2="224" y2="156" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
    <line x1="178" y1="172" x2="222" y2="167" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
    <path d="M82 95 Q100 88 118 95" fill="none" stroke="#2b2b2b" stroke-width="4" stroke-linecap="round"/>
    <path d="M142 95 Q160 88 178 95" fill="none" stroke="#2b2b2b" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="92" cy="142" rx="12" ry="9" fill="#d8d8d8" opacity="0.75"/>
    <ellipse cx="168" cy="142" rx="12" ry="9" fill="#d8d8d8" opacity="0.75"/>
</svg>
</div>

<button id="main-btn" onclick="startLeo()">Click Me</button>

<script>
    function startLeo() {
        document.getElementById('main-btn').style.display = 'none';
        const speech = document.getElementById('speech');
        speech.style.display = 'block';
        let text = "Hello! I am Leo, Lama's cat.";
        let i = 0;
        function type() {
            if (i < text.length) {
                speech.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 50);
            }
        }
        type();
    }
</script>
</body>
</html>
