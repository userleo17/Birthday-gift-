<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a1128 0%, #020514 100%);
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Neue', sans-serif;
            position: relative;
            user-select: none;
        }

        /* حاوي الشاشة الرئيسي القابل للإزاحة عند الدفع */
        #content-slider {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            transition: left 5s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        #main-canvas {
            width: 100%;
            height: 100%;
            display: none;
            background: transparent;
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            transition: opacity 1.5s ease;
        }

        /* البالونات الكيوت: تظهر بسرعة وتصعد ببطء شديد */
        .balloon {
            position: absolute;
            width: 45px;
            height: 60px;
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            bottom: -100px;
            z-index: 2;
            animation: floatUpSlowly 18s linear forwards;
        }
        .balloon::after {
            content: "";
            position: absolute;
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            bottom: -40px;
            left: 50%;
        }
        @keyframes floatUpSlowly {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            5% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-130vh) rotate(15deg); opacity: 0; }
        }

        /* واجهة اللعبة والقطو */
        .game-overlay {
            position: absolute;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 1s ease-in-out;
            z-index: 100;
        }

        .cat-container {
            width: 180px;
            height: 240px;
            margin-bottom: 20px;
            position: relative;
            /* أنميشن ظهور القطو من تحت عند البداية */
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s, left 1.2s, bottom 1.2s;
            transform: translateY(150px) scale(0.6);
            opacity: 0;
        }
        /* كلاس لتكبير وتقريب القطو في البداية */
        .cat-container.intro-active {
            transform: translateY(20px) scale(1.35);
            opacity: 1;
        }

        /* نصوص المياو الناعمة بدون حواف حادة ولا ايموجيات */
        .meow-text {
            position: absolute;
            color: #ff99cc;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        /* طق الرجل اللطيف عند الغضب */
        @keyframes footTap {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .taping-foot {
            animation: footTap 0.25s ease infinite;
        }

        /* أزرار مريحة للعين ومتناسقة مع الخلفية الليلية */
        .btn-click, .btn-check, .btn-intro-next {
            background: linear-gradient(135deg, #ff75c3 0%, #ffa6b9 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 117, 195, 0.3);
            transition: all 0.4s ease;
            margin-top: 15px;
        }
        .btn-click:hover, .btn-check:hover, .btn-intro-next:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(255, 117, 195, 0.5);
        }

        .question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.12);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            width: 80%;
            max-width: 260px;
            transition: all 0.4s;
            margin-top: 10px;
        }
        .input-box:focus {
            border-color: #ff75c3;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 12px rgba(255, 117, 195, 0.2);
        }

        .label-text {
            color: #ffe3f1;
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .warning-msg {
            color: #ff9494;
            font-size: 14px;
            margin-top: 8px;
            min-height: 24px;
            font-weight: bold;
        }

        /* فقاعة المحادثة الفاخرة للقطو ليو */
        .speech-bubble {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 2.5px solid #ff99cc;
            color: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            max-width: 240px;
            display: none;
            z-index: 150;
            bottom: 270px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 10px 0;
            border-style: solid;
            border-color: #ff99cc transparent;
            display: block;
            width: 0;
        }

        /* الأزرار النهائية مريحة جداً للعين ومتناسقة مع الخلفية المظلمة */
        .action-buttons {
            display: none;
            position: absolute;
            bottom: 40px;
            gap: 15px;
            z-index: 160;
        }
        .btn-yes {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            color: #e8f5e9;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        .btn-no {
            background: linear-gradient(135deg, #b71c1c 0%, #c62828 100%);
            color: #ffebee;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        .btn-yes:hover, .btn-no:hover {
            transform: scale(1.05);
        }

        /* الكعكة والشموع */
        #cake-svg-container {
            display: none;
            position: absolute;
            bottom: 70px;
            width: 120px;
            height: 120px;
            z-index: 105;
            transition: all 0.8s ease;
        }

        /* زر النفخ المهتز */
        .btn-blow {
            display: none;
            position: absolute;
            bottom: 25px;
            background: linear-gradient(135deg, #e65100 0%, #f57c00 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            z-index: 170;
            box-shadow: 0 5px 15px rgba(230, 81, 0, 0.4);
            animation: shakeBtn 0.3s infinite;
        }
        @keyframes shakeBtn {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        /* فيضان الدموع النهائي */
        #tear-flood {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, rgba(0, 119, 182, 0.8), rgba(0, 180, 216, 0.6));
            z-index: 200;
            transition: height 5s cubic-bezier(0.1, 0.3, 0.2, 1);
            pointer-events: none;
        }

        /* قبلة القلب الطائرة */
        .kiss-heart {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff3366;
            transform: rotate(-45deg) scale(0);
            display: none;
            z-index: 150;
        }
        .kiss-heart::before, .kiss-heart::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff3366;
            border-radius: 50%;
        }
        .kiss-heart::before { top: -15px; left: 0; }
        .kiss-heart::after { left: 15px; top: 0; }

        @keyframes heartFly {
            0% { transform: translate(0, 0) rotate(-45deg) scale(0.1); opacity: 1; }
            100% { transform: translate(-80px, -150px) rotate(-45deg) scale(2.2); opacity: 0; }
        }

        /* قطو الدفع (يظهر منفصلاً في اليمين لدفع الشاشة) */
        #pusher-cat {
            display: none;
            position: absolute;
            width: 180px;
            height: 240px;
            right: -180px;
            bottom: 20px;
            z-index: 120;
            transition: right 5s linear;
        }

        /* حركة طقطقة القلم على الرأس عند التفكير 📓✏️ */
        @keyframes penTapMotion {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-4px, -12px) rotate(-20deg); }
        }
        .thinking-pen-animation {
            animation: penTapMotion 0.4s ease-in-out infinite alternate;
            transform-origin: 52px 64px;
        }
    </style>
</head>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function heartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)
            };
        }

        function drawHeart(scale, points) {
            ctx.save();
            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                let a = (i / 628) * Math.PI * 2;
                let p = heartPoint(a);
                let x = (canvas.width / (window.devicePixelRatio || 1)) / 2 + p.x * scale;
                let y = (canvas.height / (window.devicePixelRatio || 1)) / 2 - p.y * scale + 10;
                if (i === 0) ctx.moveTo(x, y);

                { bg: 'rgba(0, 229, 255, 0.08)', border: 'rgba(0, 229, 255, 0.3)' },
                { bg: 'rgba(255, 215, 0, 0.08)', border: 'rgba(255, 215, 0, 0.3)' }

            for (let i = 0; i < totalBalloonsCount; i++) {
                const b = document.createElement('div');
                b.className = 'balloon'; 
                b.style.left = (Math.random() * 80 + 10) + 'vw';
                b.style.animationDelay = (Math.random() * 1.5) + 's'; 
                b.style.animationDuration = (Math.random() * 3 + 15) + 's'; 
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.5px solid ${theme.border}`;
                
                b.addEventListener('animationend', () => {
                    b.remove();
                    activeBalloons--;
                    if (activeBalloons <= 0) {
                        balloonsFinished = true;
                    }
                });
                document.body.appendChild(b);
            }

                    catContainer.style.bottom = '40px';
                    
                    setTimeout(() => {
                        typeWriterEffect("That's all! I wish you a happy year, honey! 💖", "speech-box", () => {
                            sendKiss(); 
                        });
                    }, 1200);
                }, 3000);

            }, 1000);
        }

        function sendKiss() {
            catPaws.innerHTML = `
                <ellipse cx="30" cy="72" rx="6" ry="5" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"/>
                <ellipse cx="50" cy="54" rx="6" ry="5" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"/>
            `;
            
            setTimeout(() => {
                catPaws.innerHTML = `
                    <ellipse cx="30" cy="72" rx="6" ry="5" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"/>
                    <ellipse cx="70" cy="72" rx="6" ry="5" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"/>
                `;
                
                const heart = document.getElementById('flying-heart');
                heart.style.display = 'block';
                heart.style.left = 'calc(50% - 15px)';
                heart.style.bottom = '180px';
                heart.style.animation = 'heartFly 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards';
            }, 1000);
        }


        // ==================== 🔴 مسار الرفض الحزين 🔴 ====================
        function chooseNo() {
            document.getElementById('action-box').style.display = 'none';
            document.getElementById('speech-box').style.display = 'none';
            
            setCatSad(); 

            setTimeout(() => {
                setCatCrying(); 
                typeWriterEffect("Why? 😭", "speech-box", () => {
                    const optYes = document.getElementById('opt-yes');
                    const optNo = document.getElementById('opt-no');
                    
                    optYes.innerText = "Okay, I will see it";
                    optYes.onclick = function() {
                        setCatSmile();
                        chooseYes();
                    };
                    
                    optNo.innerText = "I told you NO!!!";
                    optNo.onclick = function() {
                        triggerFinalTearFlood();
                    };

                    document.getElementById('action-box').style.display = 'flex';
                });
            }, 2000);
        }

        function triggerFinalTearFlood() {
            document.getElementById('action-box').style.display = 'none';
            document.getElementById('speech-box').style.display = 'none';
            setCatCrying();
            
            const flood = document.getElementById('tear-flood');
            flood.style.height = '100%';
        }


        // ==================== 🎆 جزيئات القليتر اللامعة الفاخرة ====================
        const particles = [];
        const fireworkColors = ['#ffd700', '#ffb74d', '#ff66cc', '#ffffff', '#fff0fa'];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 2 + 0.5; 
                this.gravity = 0.015;
                this.opacity = 1;
                this.decay = Math.random() * 0.005 + 0.004; 
                this.radius = Math.random() * 2 + 0.8;
                this.sparklePhase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
                this.sparklePhase += 0.15;
            }
            draw() {
                ctx.save();
                const sparkle = (Math.sin(this.sparklePhase) * 0.5 + 0.5) * this.opacity;
                ctx.globalAlpha = Math.max(0, sparkle);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            for (let i = 0; i < 35; i++) {
                particles.push(new Particle(x, y));
            }
        }


        // ==================== ⏳ أنميشن القلوب والتهنئة الرئيسي ====================
        let startTime = null;
        let showCelebration = false;
        let textOpacity = 0;

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            const wDpr = canvas.width / (window.devicePixelRatio || 1);
            const hDpr = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, wDpr, hDpr);

            let p1 = 0, p2 = 0, p3 = 0;

            if (elapsed < 4000) p1 = (elapsed / 4000) * 628;
            else p1 = 628;

            if (elapsed >= 4000 && elapsed < 8000) p2 = ((elapsed - 4000) / 4000) * 628;
            else if (elapsed >= 8000) p2 = 628;

            if (elapsed >= 8000 && elapsed < 12000) p3 = ((elapsed - 8000) / 4000) * 628;
            else if (elapsed >= 12000) {
                p3 = 628;
                if (!showCelebration) {
                    showCelebration = true;
                }
            }

            if (p1 > 0) drawHeart(5.8, p1);   
            if (p2 > 0) drawHeart(8.0, p2);   
            if (p3 > 0) drawHeart(10.2, p3);  

            if (showCelebration) {
                if (textOpacity < 1) textOpacity += 0.02; 
                ctx.save();
                ctx.globalAlpha = textOpacity;
                ctx.textAlign = "center";
                ctx.font = "bold 26px 'Arial Rounded MT Bold', sans-serif"; 
                ctx.fillStyle = "#fff0fa";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff66cc";
                ctx.fillText("Happy Birthday To Yosi 🎉", wDpr / 2, hDpr / 2 - 180);
                ctx.restore();
            }

            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });

            requestAnimationFrame(animate);
        }


        // ==================== 💬 كتابة النص حرفاً بحرف (Typewriter Effect) ====================
        function typeWriterEffect(text, elementId, callback) {
            const el = document.getElementById(elementId);
            el.innerHTML = "";
            el.style.display = "block";
            let i = 0;
            function write() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(write, 50);
                } else if (callback) {
                    callback();
                }
            }
            write();
        }

    </script>
</body>
