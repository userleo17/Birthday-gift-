<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday for Yosi</title>
    <style>
        /* 🌌 خلفية ليلية متدرجة تناسب عيد الميلاد */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0e2a 0%, #010208 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
            position: relative;
        }

        /* حاوية التصميم المركزية */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 🎂 عبارة Happy Birthday مع تأثير النيون */
        .header-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: -30px; /* تداخل خفيف مع القلوب */
            color: #fff;
            /* تأثير النيون (Glow) */
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #ff66b3,
                0 0 21px #ff66b3,
                0 0 42px #ff66b3,
                0 0 82px #ff66b3,
                0 0 92px #ff66b3;
            animation: textPulse 1.5s infinite alternate;
        }

        @keyframes textPulse {
            from { opacity: 0.8; text-shadow: 0 0 10px #ff66b3, 0 0 20px #ff66b3; }
            to { opacity: 1; text-shadow: 0 0 15px #ff66b3, 0 0 30px #ff66b3; }
        }

        /* حاوية القلوب المتداخلة (مقتبسة من هيكل الصورة) */
        .hearts-wrapper {
            position: relative;
            width: 300px; /* حجم مناسب للكمبيوتر */
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 💗 القلوب النحيفة النيون (تأثير الرسم التدريجي) */
        .heart {
            position: absolute;
            fill: none; /* القلوب من الداخل مفرغة */
            stroke: #ff66b3; /* لون النيون */
            stroke-width: 1.5px; /* نحيفة جداً مثل الصورة */
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px #ff66b3) drop-shadow(0 0 15px #ff66b3);
            /* أنيميشن الرسم التدريجي */
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawHeart 4s ease-out forwards;
        }

        /* إحداثيات القلب النحيف النيوني (دقيقة) */
        /* قلب كبير */
        .heart-outer { width: 300px; height: 300px; animation-delay: 0s; }
        /* قلب وسط */
        .heart-middle { width: 220px; height: 220px; animation-delay: 1.5s; }
        /* قلب صغير */
        .heart-inner { width: 140px; height: 140px; animation-delay: 3s; }

        @keyframes drawHeart {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* النص داخل القلب */
        .inner-text {
            position: absolute;
            font-size: 1rem;
            color: #ff66b3;
            font-weight: normal;
            font-style: italic;
            opacity: 0;
            animation: fadeIn 1s ease-out 4.5s forwards; /* يظهر بعد اكتمال رسم القلوب */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 🎈 البالونات شفافة جداً */
        .balloon {
            position: absolute;
            width: 40px;
            height: 50px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.15; /* شفافية عالية جداً */
            background-color: #ff66b3; /* لون أساسي خفيف */
            border: 1px solid rgba(255, 102, 179, 0.4);
            bottom: -60px;
            animation: floatUp 15s linear infinite;
        }
        
        .balloon-string {
            position: absolute;
            width: 1px;
            height: 30px;
            background: rgba(255, 102, 179, 0.2);
            bottom: -30px;
            left: 50%;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        /* 🎆 حاوية الألعاب النارية */
        #fireworks-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 📱 التوافق مع الجوال والآيباد */
        @media (max-width: 768px) {
            .header-text { font-size: 2rem; margin-bottom: -15px; }
            .hearts-wrapper { width: 220px; height: 220px; }
            .heart-outer { width: 220px; height: 220px; }
            .heart-middle { width: 160px; height: 160px; }
            .heart-inner { width: 100px; height: 100px; }
            .inner-text { font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            .header-text { font-size: 1.5rem; margin-bottom: -10px; }
            .hearts-wrapper { width: 180px; height: 180px; }
            .heart-outer { width: 180px; height: 180px; }
            .heart-middle { width: 130px; height: 130px; }
            .heart-inner { width: 80px; height: 80px; }
            .inner-text { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- 🎆 كانفاس للألعاب النارية -->
    <canvas id="fireworks-canvas"></canvas>

    <div class="container">
        <!-- 🎂 عبارة التهنئة الرئيسية (نيون) -->
        <div class="header-text">Happy Birthday to yosi 🎉</div>

        <!-- 💗 حاوية القلوب النحيفة المتداخلة (مستوحاة من الصورة) -->
        <div class="hearts-wrapper">
            <!-- مسار القلب SVG النحيف للتحكم في الرسم -->
            <svg class="heart heart-outer" viewBox="0 0 32 29.6">
                <path d="M23.6 0c-3.4 0-6.3 2.7-7.6 5.6C14.7 2.7 11.8 0 8.4 0 3.8 0 0 3.8 0 8.4c0 9.4 9.5 11.9 16 21.2 6.1-9.3 16-12.1 16-21.2C32 3.8 28.2 0 23.6 0z"/>
            </svg>
            <svg class="heart heart-middle" viewBox="0 0 32 29.6">
                <path d="M23.6 0c-3.4 0-6.3 2.7-7.6 5.6C14.7 2.7 11.8 0 8.4 0 3.8 0 0 3.8 0 8.4c0 9.4 9.5 11.9 16 21.2 6.1-9.3 16-12.1 16-21.2C32 3.8 28.2 0 23.6 0z"/>
            </svg>
            <svg class="heart heart-inner" viewBox="0 0 32 29.6">
                <path d="M23.6 0c-3.4 0-6.3 2.7-7.6 5.6C14.7 2.7 11.8 0 8.4 0 3.8 0 0 3.8 0 8.4c0 9.4 9.5 11.9 16 21.2 6.1-9.3 16-12.1 16-21.2C32 3.8 28.2 0 23.6 0z"/>
            </svg>
            
            <!-- النص الداخلي -->
            <div class="inner-text">Happy Birthday to yosi</div>
        </div>
    </div>

    <script>
        // --- 🎆 تأثير الألعاب النارية (تنفجر مرتين وتتوقف) ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#ff66b3', '#ff99cc', '#fff', '#ff3385'];
        let explosionCount = 0;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 6 + 1;
                this.friction = 0.95;
                this.gravity = 0.1;
                this.opacity = 1;
                this.decay = Math.random() * 0.015 + 0.01;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                // تأثير توهج للألعاب النارية
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
        }

        function createExplosion(x, y) {
            explosionCount++;
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
        }

        function animateFireworks() {
            if (explosionCount > 1 && particles.length === 0) return; // توقف بعد انفجارين وتلاشي الجزيئات
            requestAnimationFrame(animateFireworks);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            });
        }

        // إطلاق الانفجارين
        setTimeout(() => createExplosion(window.innerWidth * 0.3, window.innerHeight * 0.3), 1000);
        setTimeout(() => createExplosion(window.innerWidth * 0.7, window.innerHeight * 0.2), 2500);
        animateFireworks();


        // --- 🎈 إنشاء بالونات شفافة ---
        function createBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 90 + 'vw';
            b.style.animationDelay = Math.random() * 5 + 's';
            
            const string = document.createElement('div');
            string.className = 'balloon-string';
            b.appendChild(string);
            
            document.body.appendChild(b);
            
            // إزالة البالونة بعد انتهاء الأنيميشن لتوفير الذاكرة
            setTimeout(() => b.remove(), 16000);
        }

        // إنشاء بالونات بشكل دوري
        setInterval(createBalloon, 800);
        
        // تعديل حجم الكانفاس عند تغيير حجم الشاشة
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
