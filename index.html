<!DOCTYPE html>

<title>Happy Birthday</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    width:100%;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(to bottom,#14002f,#001a33);
}

#scene{

    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

#leo{

    position:absolute;
    left:50%;
    bottom:-350px;
    transform:translateX(-50%);
    width:260px;
    height:260px;
    transition:1.2s ease;
}

#startBtn{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    padding:18px 45px;

    border:none;

    border-radius:18px;

    background:#73c88d;

    color:white;

    font-size:23px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

    box-shadow:0 0 25px rgba(115,200,141,.35);

}

#startBtn:hover{

    transform:translate(-50%,-50%) scale(1.08);

}

#speech{

    position:absolute;

    left:50%;

    top:70px;

    transform:translateX(-50%);

    min-width:320px;

    max-width:430px;

    padding:18px 22px;

    background:white;

    color:#333;

    border-radius:25px;

    display:none;

    text-align:center;

    font-size:20px;

    line-height:1.6;

    box-shadow:0 12px 30px rgba(0,0,0,.25);

}

#speech::after{

    content:"";

    position:absolute;

    bottom:-18px;

    left:50%;

    transform:translateX(-50%);

    border:10px solid transparent;

    border-top-color:white;

}

#text{

    display:inline-block;

}

#nextBtn{

    position:absolute;

    left:50%;

    bottom:70px;

    transform:translateX(-50%);

    padding:15px 40px;

    background:#73c88d;

    color:white;

    border:none;

    border-radius:15px;

    cursor:pointer;

    font-size:20px;

    display:none;

    transition:.3s;

}

#nextBtn:hover{

    transform:translateX(-50%) scale(1.07);

}

.fade{

    animation:fade .5s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<button id="startBtn">

<div id="speech">

<span id="text"></span>

<script>

const startBtn = document.getElementById("startBtn");
const leo = document.getElementById("leo");
const speech = document.getElementById("speech");
const text = document.getElementById("text");
const nextBtn = document.getElementById("nextBtn");

const message = "Hello, I'm Leo, Lama's cat.";

function typeWriter(sentence, speed = 50){

    text.innerHTML = "";

    let i = 0;

    const timer = setInterval(function(){

        text.innerHTML += sentence.charAt(i);

        i++;

        if(i >= sentence.length){

            clearInterval(timer);

            nextBtn.style.display = "block";

        }

    }, speed);

}

startBtn.addEventListener("click", function(){

    startBtn.style.display = "none";

    leo.style.bottom = "120px";

    setTimeout(function(){

        speech.style.display = "block";

        typeWriter(message);

    },1200);

});
    
nextBtn.addEventListener("click", function(){

    nextBtn.style.display = "none";

    text.innerHTML = "";

    typeWriter("This is a gift from her for your birthday.");

});
</script>
