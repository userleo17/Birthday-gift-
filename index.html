<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#001a33;
    overflow:hidden;
}

canvas{
    background:#001a33;
}
</style>
</head>

<body>

<canvas id="canvas" width="700" height="750"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");


function heartPoint(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    };
}


const hearts = [
    {scale:8},
    {scale:12},
    {scale:16}
];


let currentHeart = 0;
let currentPoint = 0;


function drawHeart(scale, points){

    ctx.beginPath();

    for(let i=0;i<=points;i++){

        let a=i/100;
        let p=heartPoint(a);

        let x=canvas.width/2+p.x*scale;
        let y=canvas.height/2-p.y*scale;


        if(i===0){
            ctx.moveTo(x,y);
        }else{
            ctx.lineTo(x,y);
        }
    }


    ctx.strokeStyle="#ff66b2";
    ctx.lineWidth=3;
    ctx.stroke();
}



function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);


    // القلوب المكتملة
    for(let i=0;i<currentHeart;i++){
        drawHeart(hearts[i].scale,628);
    }


    // رسم القلب الحالي بالتدريج
    if(currentHeart < hearts.length){

        drawHeart(
            hearts[currentHeart].scale,
            currentPoint
        );


        currentPoint += 2;


        if(currentPoint >= 628){

            currentPoint = 0;
            currentHeart++;

        }

    }else{


        ctx.textAlign="center";
        ctx.fillStyle="#ffb3d1";
        ctx.font="italic 22px Arial";

        ctx.fillText(
            "Happy Birthday to yosi",
            canvas.width/2,
            canvas.height/2+20
        );


        return;
    }


    requestAnimationFrame(animate);

}


animate();

</script>

</body>
</html>
