<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية كحلية عميقة ومريحة للعين */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #07152c 0%, #020712 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم المركزية */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* 💗 حاوية القلوب النيون المتداخلة */
        .hearts-svg {
            width: 90vw;
            max-width: 480px;
            height: auto;
            position: absolute;
            /* 🔥 السر هنا: يمنع المتصفح من قص لمعة النيون ويجعلها تنتشر بحرية دون حواف مربعة */
            overflow: visible !important; 
        }

        /* ستايل مسارات القلوب النحيفة */
        .heart-path {
            fill: none;
            stroke: #ff66b3; /* لون نيون وردي ساحر */
            stroke-width: 1px; /* خطوط نحيفة جداً ومطابقة لطلبك */
            stroke-linecap: round;
            vector-effect: non-scaling-stroke; /* للحفاظ على النحافة في كل الشاشات */
            
            /* ✨ تأثير توهج نيون طبيعي وناعم ينتشر بالكامل */
            filter: drop-shadow(0 0 8px rgba(255, 102, 179, 0.8)) 
                    drop-shadow(0 0 20px rgba(255, 51, 153, 0.5))
                    drop-shadow(0 0 35px rgba(255, 51, 153, 0.3));
            
            /* تجهيز أنيميشن الرسم التدريجي */
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        /* ⏱️ تراتبية الرسم التدريجي (من الصغير إلى الكبير) */
        
        /* 1. القلب الصغير (يبدأ أولاً) */
        .heart-inner {
            transform-origin: 50px 53px;
            transform: scale(0.5);
            animation: drawStep 2s ease-out 0.5s forwards;
        }

        /* 2. القلب الوسط (يبدأ ثانياً) */
        .heart-middle {
            transform-origin: 50px 53px;
            transform: scale(0.75);
            animation: drawStep 2s ease-out 2s forwards;
        }

        /* 3. القلب الكبير (يبدأ أخيراً) */
        .heart-outer {
            transform-origin: 50px 53px;
            transform: scale(1);
            animation: drawStep 2s ease-out 3.5s forwards;
        }

        @keyframes drawStep {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 🎂 عبارة التهنئة (نيون ناعم بالمنتصف تماماً مثل الصورة) */
        .birthday-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 500;
            color: #ffb3d9;
            font-style: italic;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            /* نيون فخم للنص متناسق مع لمعة القلوب */
            text-shadow: 
                0 0 6px #ff66b3,
                0 0 15px #ff3399;
            animation: fadeInText 1.5s ease-out 1s forwards;
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* 🎈 البالونات الشفافة جداً */
        .balloon {
            position: absolute;
            width: 45px;
            height: 55px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background-color: rgba(255, 102, 179, 0.04); /* شفافة للغاية */
            border: 1px solid rgba(255, 102, 179, 0.15);
            bottom: -80px;
            z-index: 2;
            animation: floatUp 14s linear infinite;
        }
        
        .balloon::after {
            content: "";
            position: absolute;
            width: 1px;
            height: 25px;
            background: rgba(255, 102, 179, 0.08);
            bottom: -25px;
            left: 50%;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
        }

        /* 🎆 الألعاب النارية */
        #canvas-fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 📱 متجاوب بالكامل مع كافة الشاشات (Responsive) */
        @media (max-width: 600px) {
            .birthday-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 🎆 تأثير الألعاب النارية -->
    <canvas id="canvas-fireworks"></canvas>

    <div class="container">
        <!-- 🎂 عبارة التهنئة النيون بالمنتصف -->
        <div class="birthday-text">Happy Birthday to yosi 🎉</div>

        <!-- 💗 القلوب النحيفة مدمجة داخل SVG مع تفعيل ميزة عدم القص (overflow: visible) -->
        <svg class="hearts-svg" viewBox="0 0 100 106">
            <!-- القلب الصغير (الداخلي) -->
            <path class="heart-path heart-inner" d="M 50,32 C 43,18 25,18 25,45 C 25,67 50,88 50,88 C 50,88 75,67 75,45 C 75,18 57,18 50,32 Z" />
            
            <!-- القلب الوسط (الأوسط) -->
            <path class="heart-path heart-middle" d="M 50,32 C 43,18 25,18 25,45 C 25,67 50,88 50,88 C 50,88 75,67 75,45 C 75,18 57,18 50,32 Z" />
            
            <!-- القلب الكبير (الخارجي) -->
            <path class="heart-path heart-outer" d="M 50,32 C 43,18 25,18 25,45 C 25,67 50,88 50,88 C 50,88 75,67 75,45 C 75,18 57,18 50,32 Z" />
        </svg>
    </div>

    <script>
        // --- 🎈 إنشاء بالونات شفافة هادئة ---
        function generateBalloons() {
            for (let i = 0; i < 12; i++) {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random() * 90 + 'vw';
                b.style.animationDelay = Math.random() * 8 + 's';
                document.body.appendChild(b);
            }
        }
        generateBalloons();

        // --- 🎆 الألعاب النارية (انفجارين فقط لتجنب الإزعاج البصري) ---
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const colors = ['#ff66b3', '#ff99cc', '#ffffff'];
        let explosions = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 1;
                this.gravity = 0.08;
                this.opacity = 1;
                this.decay = Math.random() * 0.012 + 0.01;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.8, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            explosions++;
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function anim() {
            if (explosions >= 2 && particles.length === 0) return; // توقف بعد انفجارين
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });
            requestAnimationFrame(anim);
        }

        // تفجير الألعاب النارية مرتين في أوقات متفرقة وجذابة
        setTimeout(() => triggerExplosion(window.innerWidth * 0.25, window.innerHeight * 0.3), 1200);
        setTimeout(() => triggerExplosion(window.innerWidth * 0.75, window.innerHeight * 0.25), 2600);
        anim();
    </script>
</body>
</html>
