<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(#12002b,#001a33);
    overflow:hidden;
}


canvas{
    background:transparent;
}

</style>

</head>


<body>

<canvas id="canvas"></canvas>


<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");


function resizeCanvas(){

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);



function heartPoint(t){

    return {

        x:16*Math.pow(Math.sin(t),3),

        y:13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t)

    };

}



const hearts=[
    {scale:5},
    {scale:8},
    {scale:11}
];


let currentHeart=0;
let currentPoint=0;


let fireworks=[];
let balloons=[];
let balloonsStarted=false;



function drawHeart(scale,points){


    ctx.beginPath();


    for(let i=0;i<=points;i++){


        let a=i/100;

        let p=heartPoint(a);


        let x=canvas.width/2+p.x*scale;

        let y=canvas.height/2-p.y*scale+30;



        if(i===0){

            ctx.moveTo(x,y);

        }else{

            ctx.lineTo(x,y);

        }

    }


    ctx.strokeStyle="#ff66cc";

    ctx.lineWidth=4;

    ctx.shadowBlur=20;

    ctx.shadowColor="#ff66cc";


    ctx.stroke();


    ctx.shadowBlur=0;

}




// 🎆 Fireworks

function createFirework(){


    let x=Math.random()*canvas.width;

    let y=Math.random()*canvas.height*0.35;


    for(let i=0;i<70;i++){


        let angle=Math.random()*Math.PI*2;

        let speed=Math.random()*6+2;


        fireworks.push({

            x:x,

            y:y,

            dx:Math.cos(angle)*speed,

            dy:Math.sin(angle)*speed,

            life:100,

            size:Math.random()*3+2

        });

    }

}




function drawFireworks(){


    fireworks.forEach((f,index)=>{


        ctx.beginPath();


        ctx.arc(
            f.x,
            f.y,
            f.size,
            0,
            Math.PI*2
        );


        ctx.fillStyle=[
            "#ff66b2",
            "#ffd700",
            "#00ffff",
            "#ffffff"
        ][Math.floor(Math.random()*4)];


        ctx.fill();


        f.x+=f.dx;

        f.y+=f.dy;

        f.dy+=0.05;

        f.life--;


        if(f.life<=0){

            fireworks.splice(index,1);

        }


    });

}




// 🎈 Balloons

function createBalloons(){


    for(let i=0;i<15;i++){


        balloons.push({

            x:Math.random()*canvas.width,

            y:canvas.height+Math.random()*200,

            size:25+Math.random()*15,

            speed:1+Math.random()*2,

            color:[
                "#ff66b2",
                "#ffd700",
                "#00ffff",
                "#ff99ff",
                "#ffffff"
            ][Math.floor(Math.random()*5)]

        });

    }

}




function drawBalloons(){


    balloons.forEach((b,index)=>{


        ctx.beginPath();


        ctx.arc(
            b.x,
            b.y,
            b.size,
            0,
            Math.PI*2
        );


        ctx.fillStyle=b.color;


        ctx.shadowBlur=15;

        ctx.shadowColor=b.color;


        ctx.fill();


        ctx.shadowBlur=0;



        // خيط البالون

        ctx.beginPath();

        ctx.moveTo(
            b.x,
            b.y+b.size
        );


        ctx.lineTo(
            b.x,
            b.y+b.size+50
        );


        ctx.strokeStyle="#ffffff";

        ctx.stroke();



        b.y-=b.speed;



        if(b.y<-50){

            balloons.splice(index,1);

        }


    });

}






function animate(){


    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );



    // القلوب المكتملة

    for(let i=0;i<currentHeart;i++){

        drawHeart(
            hearts[i].scale,
            628
        );

    }





    // رسم القلب الحالي

    if(currentHeart<hearts.length){


        drawHeart(
            hearts[currentHeart].scale,
            currentPoint
        );


        currentPoint+=2;


        if(currentPoint>=628){

            currentPoint=0;

            currentHeart++;

        }



    }else{


        drawBalloons();

        drawFireworks();



        // 🎂 النص فوق القلب

        ctx.textAlign="center";

        ctx.font="bold 32px Arial";

        ctx.fillStyle="#fff0fa";

        ctx.shadowBlur=20;

        ctx.shadowColor="#ff66cc";


        ctx.fillText(
            "Happy Birthday to yosi 🎉",
            canvas.width/2,
            canvas.height/2-190
        );


        ctx.shadowBlur=0;



        if(fireworks.length<250){

            createFirework();

        }



        if(!balloonsStarted){

            createBalloons();

            balloonsStarted=true;

        }


    }



    requestAnimationFrame(animate);

}



animate();


</script>


</body>
</html>
