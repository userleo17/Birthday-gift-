<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية كحلية عميقة ومطابقة لشاشة اللابتوب والصورة */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0b1a30 0%, #030813 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم المركزية */
        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            z-index: 10;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 🎂 عبارة التهنئة في الأعلى بوهج نيون أبيض ووردي مذهل */
        .birthday-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            text-shadow: 
                0 0 8px #ff66b3,
                0 0 15px #ff3399,
                0 0 30px #ff3399;
            margin-bottom: 10px;
        }

        /* 💗 حاوية القلوب الدائرية الكبيرة المتداخلة */
        .hearts-wrapper {
            position: relative;
            width: 360px; /* جعل الحجم أكبر ومناسباً */
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hearts-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: visible !important; /* لانتشار توهج النيون بدون أي قص */
        }

        /* مسار القلب الدائري العريض المنحني بدقة (مثل معادلة بايثون بالصورة) */
        .heart-path {
            fill: none;
            stroke: #ff66b3; 
            stroke-width: 1.5px; /* نحيف وفخم */
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
            
            /* توهج النيون المشرق والناعم */
            filter: drop-shadow(0 0 6px rgba(255, 102, 179, 0.9)) 
                    drop-shadow(0 0 18px rgba(255, 51, 153, 0.6))
                    drop-shadow(0 0 28px rgba(255, 51, 153, 0.3));
            
            /* تجهيز أنيميشن الرسم التدريجي البطيء */
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
        }

        /* ⏱️ تأثير رسم القلوب تدريجياً ببطء من الداخل إلى الخارج */
        
        /* 1. القلب الصغير الداخلي */
        .heart-inner {
            transform-origin: 50px 50px;
            transform: scale(0.52);
            animation: drawSlow 3.5s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
        }

        /* 2. القلب الوسط */
        .heart-middle {
            transform-origin: 50px 50px;
            transform: scale(0.78);
            animation: drawSlow 3.5s cubic-bezier(0.4, 0, 0.2, 1) 2.2s forwards;
        }

        /* 3. القلب الكبير الخارجي */
        .heart-outer {
            transform-origin: 50px 50px;
            transform: scale(1.05);
            animation: drawSlow 3.5s cubic-bezier(0.4, 0, 0.2, 1) 4s forwards;
        }

        /* أنيميشن الرسم البطيء والناعم للخطوط */
        @keyframes drawSlow {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 🎈 البالونات الشفافة الدائرية الفخمة */
        .balloon {
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 50%; /* دائرية تماماً كالمصاصات في الصورة الثانية */
            bottom: -120px;
            z-index: 2;
            /* تبدأ بالصعود فوراً مع تحميل الصفحة */
            animation: floatUp 13s linear infinite;
        }

        /* عصا البالونة البيضاء الأنيقة */
        .balloon::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 35px;
            background: rgba(255, 255, 255, 0.25);
            bottom: -35px;
            left: calc(50% - 1px);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            8% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(12deg); opacity: 0; }
        }

        /* 🎆 حاوية الألعاب النارية */
        #canvas-fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 📱 متجاوب تماماً مع أحجام الجوالات المختلفة */
        @media (max-width: 600px) {
            .birthday-text {
                font-size: 1.7rem;
            }
            .hearts-wrapper {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- 🎆 كانفاس الألعاب النارية (طراطيع دائرية ملونة) -->
    <canvas id="canvas-fireworks"></canvas>

    <div class="container">
        <!-- 🎂 عبارة التهنئة فوق القلب مباشرة -->
        <h1 class="birthday-text">Happy Birthday to yosi 🎉</h1>

        <!-- 💗 القلوب الدائرية المتداخلة بمسار عريض ومنفوش مثل البايثون تماماً -->
        <div class="hearts-wrapper">
            <svg class="hearts-svg" viewBox="0 0 100 100">
                <!-- رسم القلب بالمعادلة الدائرية المنفوخة المثالية -->
                <!-- القلب الصغير -->
                <path class="heart-path heart-inner" d="M 50,28 C 40,12 14,12 14,42 C 14,65 50,88 50,88 C 50,88 86,65 86,42 C 86,12 60,12 50,28 Z" />
                
                <!-- القلب الوسط -->
                <path class="heart-path heart-middle" d="M 50,28 C 40,12 14,12 14,42 C 14,65 50,88 50,88 C 50,88 86,65 86,42 C 86,12 60,12 50,28 Z" />
                
                <!-- القلب الكبير -->
                <path class="heart-path heart-outer" d="M 50,28 C 40,12 14,12 14,42 C 14,65 50,88 50,88 C 50,88 86,65 86,42 C 86,12 60,12 50,28 Z" />
            </svg>
        </div>
    </div>

    <script>
        // --- 🎈 إنشاء البالونات الدائرية الشفافة فوراً عند تحميل الصفحة ---
        function generateBalloons() {
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.1)', border: 'rgba(255, 102, 179, 0.25)', glow: 'rgba(255, 102, 179, 0.15)' }, // وردي
                { bg: 'rgba(0, 229, 255, 0.1)', border: 'rgba(0, 229, 255, 0.25)', glow: 'rgba(0, 229, 255, 0.15)' },   // سماوي
                { bg: 'rgba(255, 215, 0, 0.1)', border: 'rgba(255, 215, 0, 0.25)', glow: 'rgba(255, 215, 0, 0.15)' },     // أصفر
                { bg: 'rgba(255, 255, 255, 0.06)', border: 'rgba(255, 255, 255, 0.18)', glow: 'rgba(255, 255, 255, 0.08)' } // أبيض
            ];

            // توليد البالونات فوراً مع انعدام التأخير لتبدأ بالظهور فور تشغيل الصفحة
            for (let i = 0; i < 14; i++) {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random() * 85 + 'vw';
                b.style.animationDelay = (Math.random() * 6) + 's'; // تأخير بسيط جداً للتناوب الطبيعي
                b.style.animationDuration = (Math.random() * 5 + 10) + 's';
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.5px solid ${theme.border}`;
                b.style.boxShadow = `0 0 12px ${theme.glow}`;
                
                document.body.appendChild(b);
            }
        }

        // --- 🎆 الألعاب النارية المتزامنة مع البالونات (تنفجر مرتين فقط فور البداية) ---
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const fireworkColors = ['#ff66b3', '#ffd700', '#00e5ff', '#ffffff'];
        let explosions = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 1.5;
                this.gravity = 0.04;
                this.opacity = 1;
                this.decay = Math.random() * 0.01 + 0.008;
                this.radius = Math.random() * 3 + 1;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            if (explosions >= 2) return;
            explosions++;
            for (let i = 0; i < 65; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function anim() {
            if (explosions >= 2 && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });
            requestAnimationFrame(anim);
        }

        // 💥 تشغيل كل شيء معاً فور تحميل الصفحة بالكامل
        window.onload = () => {
            generateBalloons(); // تشغيل صعود البالونات
            
            // تفجير الطراطيع في نفس الوقت (الانفجار الأول فوراً والثاني يلحقه مباشرة بعد ثانية ونصف)
            triggerExplosion(window.innerWidth * 0.3, window.innerHeight * 0.4); 
            setTimeout(() => {
                triggerExplosion(window.innerWidth * 0.7, window.innerHeight * 0.3);
            }, 1500);
            
            anim();
        };
    </script>
</body>
</html>
