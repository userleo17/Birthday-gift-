<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* radial-gradient(circle at center, #061124 0%, #020610 100%); radial-gradient(circle at center, #061124 0%, #020610 100%); */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #061124 0%, #020610 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* container */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-sizing: border-box;
        }

        /* main-canvas */
        #main-canvas {
            width: 100%;
            height: 100%;
            max-height: 85vh;
            display: none; /* none */
            background: transparent;
            pointer-events: none;
            position: absolute;
            top: 5vh;
        }

        /* balloon */
        .balloon {
            position: absolute;
            width: 42px;
            height: 56px;
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            bottom: -100px;
            z-index: 2;
            animation: floatUpSlowly 14s linear forwards;
        }
        .balloon::after {
            content: "";
            position: absolute;
            width: 1.2px;
            height: 30px;
            background: rgba(255, 255, 255, 0.15);
            bottom: -30px;
            left: calc(50% - 0.6px);
        }
        @keyframes floatUpSlowly {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-125vh) rotate(10deg); opacity: 0; }
        }

        /* ==================== 🐱 واجهة اللعبة التفاعلية ==================== */
        .game-overlay {
            position: absolute;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.5s ease;
            z-index: 100;
        }

        /* interactive-cat */
        .cat-container {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s;
        }

        /* cat-escape */
        .cat-escape {
            transform: translateX(600px) scale(0.7) !important;
            opacity: 0;
        }

        /* smoke-active */
        .smoke-cloud {
            position: absolute;
            bottom: 20px;
            left: 30px;
            width: 40px;
            height: 20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
        .smoke-active {
            animation: smokeBlow 0.6s ease-out forwards;
        }
        @keyframes smokeBlow {
            0% { transform: scale(0.5) translateX(0); opacity: 0; filter: blur(0px); }
            50% { opacity: 0.8; filter: blur(3px); }
            100% { transform: scale(1.8) translateX(-100px); opacity: 0; filter: blur(8px); }
        }

        /* meow-bubble meow-bubble */
        .meow-bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            color: #523725;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            pointer-events: none;
            opacity: 0; /* none */
            top: -15px;
            left: 20px;
            transform-origin: bottom center;
            transition: opacity 0.3s ease, transform 0.3s ease; /* transition transition transition */
        }

        /* meow-active meow-active */
        .meow-active {
            opacity: 1 !important;
            transform: scale(1) translateY(0) !important;
            animation: meowPulse 1.5s infinite; /* animation */
        }

        @keyframes meowPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* btn-click btn-click */
        .btn-click {
            background: linear-gradient(135deg, #ff66cc 0%, #ff3399 100%);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 102, 204, 0.4);
            transition: all 0.3s ease;
        }
        .btn-click:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 102, 204, 0.6);
        }

        /* step-2 */
        .question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            width: 80%;
            max-width: 280px;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .input-box:focus {
            border-color: #ff66cc;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(255, 102, 204, 0.25);
        }

        .label-text {
            color: #fff0fa;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(255, 102, 204, 0.2);
        }

        .warning-msg {
            color: #ff9966;
            font-size: 13px;
            margin-top: 10px;
            min-height: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ==================== 🐱 واجهة اللعبة المصغرة الكيوت ==================== -->
        <div class="game-overlay" id="setup-panel">
            
            <!-- interactive-cat interactive-cat -->
            <div class="cat-container" id="interactive-cat">
                <!-- meow-bubble meow-bubble -->
                <div class="meow-bubble" id="meow-1">Meow... 🐾</div>
                <div class="meow-bubble" id="meow-2" style="left: 100px; top: -25px;">Meow~ 💗</div>

                <svg id="cat-svg" viewBox="0 0 100 100" width="100%" height="100%">
                    <!-- #f5e1c4 -->
                    <ellipse cx="50" cy="65" rx="25" ry="20" fill="#f5e1c4"/>
                    <!-- #f5e1c4 -->
                    <circle cx="50" cy="45" r="21" fill="#f5e1c4"/>
                    <!-- Polygon points Polygon points -->
                    <polygon points="32,32 42,16 48,30" fill="#f5e1c4"/>
                    <polygon points="35,30 42,19 46,29" fill="#f2bca6"/>
                    <!-- Polygon points Polygon points -->
                    <polygon points="68,32 58,16 52,30" fill="#f5e1c4"/>
                    <polygon points="65,30 58,19 54,29" fill="#f2bca6"/>
                    
                    <!-- الذيل الكيوت -->
                    <path d="M 72 73 C 85 73, 85 55, 80 50" fill="none" stroke="#f5e1c4" stroke-width="5" stroke-linecap="round"/>

                    <!-- cat-face-features -->
                    <g id="cat-face-features">
                        <!-- Q Q -->
                        <path d="M 36,43 Q 40,39 44,43" fill="none" stroke="#6b4c35" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M 56,43 Q 60,39 64,43" fill="none" stroke="#6b4c35" stroke-width="2.5" stroke-linecap="round"/>
                        <!-- الأنف الكيوت والشارب -->
                        <polygon points="48,48 52,48 50,50" fill="#e89885"/>
                        <path d="M 47,52 Q 50,54 53,52" fill="none" stroke="#6b4c35" stroke-width="1.5"/>
                        <!-- #fca8a1 #fca8a1 -->
                        <circle cx="34" cy="48" r="4" fill="#fca8a1" opacity="0.7"/>

                    <!-- cat-paws cat-paws -->
                    <g id="cat-paws">
                        <ellipse cx="40" cy="72" rx="4" ry="3.5" fill="#f5e1c4"/>

                    </g>
                </svg>
                <!-- smoke-active 💨 -->
                <div class="smoke-cloud" id="escape-smoke"></div>
            </div>

            <!-- step-1 -->
            <div class="start-screen" id="step-1">
                <button class="btn-click" onclick="goToQuestion()">Click Me!</button>
            </div>

            <!-- step-2 -->
            <div class="question-screen" id="step-2">
                <div class="label-text">What is your favorite nickname?</div>
                <input type="text" class="input-box" id="nickname-input" placeholder="Type here..." oninput="checkInput(this.value)">
                <div class="warning-msg" id="msg-box"></div>
            </div>

        </div>

        <!-- 🎨 كانفاس موحد للرسم لضمان الدقة العالية والتزامن -->
        <canvas id="main-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 💗 دالة حساب إحداثيات نقاط القلب
        function heartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)
            };
        }

        // 💗 دالة رسم القلب
        function drawHeart(scale, points) {
            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                let a = (i / 628) * Math.PI * 2;
                let p = heartPoint(a);
                let x = (canvas.width / (window.devicePixelRatio || 1)) / 2 + p.x * scale;
                let y = (canvas.height / (window.devicePixelRatio || 1)) / 2 - p.y * scale + 10;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.strokeStyle = "#ff66cc";
            ctx.lineWidth = 3.5;
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff66cc";
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ==================== 🐱 ملامح وتحريكات القطة الكيوت ====================
        const catFace = document.getElementById('cat-face-features');
        const catPaws = document.getElementById('cat-paws');

        // setCatThinking setCatThinking
        function setCatThinking() {
            catFace.innerHTML = `
                <circle cx="38" cy="42" r="3" fill="#6b4c35"/>
                <circle cx="62" cy="42" r="3" fill="#6b4c35"/>
                <path d="M 33,36 Q 38,34 43,37" fill="none" stroke="#6b4c35" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M 57,37 Q 62,34 67,36" fill="none" stroke="#6b4c35" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="47" y1="51" x2="53" y2="51" stroke="#6b4c35" stroke-width="2" stroke-linecap="round"/>
                <circle cx="34" cy="48" r="3" fill="#fca8a1" opacity="0.5"/>
                <circle cx="66" cy="48" r="3" fill="#fca8a1" opacity="0.5"/>
            `;
            catPaws.innerHTML = `
                <ellipse cx="33" cy="56" rx="4" ry="4.5" fill="#f5e1c4"/>
                <ellipse cx="60" cy="72" rx="4" ry="3.5" fill="#f5e1c4"/>
            `;
        }

        // setCatEmbarrassed setCatEmbarrassed
        function setCatEmbarrassed() {
            catFace.innerHTML = `
                <path d="M 35,44 Q 39,40 43,44" fill="none" stroke="#6b4c35" stroke-width="2" stroke-linecap="round"/>
                <path d="M 57,44 Q 61,40 65,44" fill="none" stroke="#6b4c35" stroke-width="2" stroke-linecap="round"/>
                <path d="M 28,34 C 27,34 26,36 28,38 C 30,36 29,34 28,34" fill="#66ccff"/>
                <path d="M 45,51 Q 50,56 55,51 Z" fill="#6b4c35"/>
                <circle cx="32" cy="49" r="4.5" fill="#fca8a1"/>
                <circle cx="68" cy="49" r="4.5" fill="#fca8a1"/>
            `;
            catPaws.innerHTML = `
                <ellipse cx="44" cy="70" rx="4.5" ry="3.5" fill="#f5e1c4"/>
                <ellipse cx="56" cy="70" rx="4.5" ry="3.5" fill="#f5e1c4"/>
            `;
        }

        // setCatAngry setCatAngry
        function setCatAngry() {
            catFace.innerHTML = `
                <circle cx="38" cy="43" r="3.5" fill="#6b4c35"/>
                <circle cx="62" cy="43" r="3.5" fill="#6b4c35"/>
                <path d="M 33,36 L 43,41" stroke="#6b4c35" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M 67,36 L 57,41" stroke="#6b4c35" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M 46,54 Q 50,50 54,54" fill="none" stroke="#6b4c35" stroke-width="2" stroke-linecap="round"/>
                <circle cx="33" cy="48" r="4" fill="#ff4d4d" opacity="0.6"/>
                <circle cx="67" cy="48" r="4" fill="#ff4d4d" opacity="0.6"/>
            `;
            catPaws.innerHTML = `
                <ellipse cx="30" cy="65" rx="3.5" ry="4" fill="#f5e1c4"/>
                <ellipse cx="70" cy="65" rx="3.5" ry="4" fill="#f5e1c4"/>
            `;
        }

        // setCatSuccess setCatSuccess 🙏🏼
        function setCatSuccess() {
            catFace.innerHTML = `
                <!-- ❤️❤️ -->
                <g fill="#ff3366" stroke="#cc0033" stroke-width="0.5">
                    <path d="M 38,45 C 33,40 33,34 38,37 C 43,34 43,40 38,45" transform="scale(0.9) translate(4, 5)"/>
                    <path d="M 62,45 C 57,40 57,34 62,37 C 67,34 67,40 62,45" transform="scale(0.9) translate(8, 5)"/>
                </g>
                <!-- 😮 -->
                <ellipse cx="50" cy="53" rx="4.5" ry="5.5" fill="#6b4c35"/>
                <path d="M 47,49 Q 50,47 53,49" fill="none" stroke="#6b4c35" stroke-width="1.5"/>
                <!-- الخدود المحمرة متوهجة -->
                <circle cx="31" cy="48" r="4.5" fill="#ff9999" opacity="0.8"/>
                <circle cx="69" cy="48" r="4.5" fill="#ff9999" opacity="0.8"/>
            `;
            // 🙏🏼
            catPaws.innerHTML = `
                <g fill="#f5e1c4">
                    <!-- #e3cca9 stroke-width -->
                    <path d="M 46,72 C 46,65 50,65 50,72" stroke="#e3cca9" stroke-width="0.8"/>
                    <path d="M 54,72 C 54,65 50,65 50,72" stroke="#e3cca9" stroke-width="0.8"/>
                </g>
            `;
        }


        // ==================== ⏱️ نظام التفاعل الحقيقي 100% (المياو تظهر عند الهدوء فقط) ====================
        let meowTimeout = null;
        const meow1 = document.getElementById('meow-1');
        const meow2 = document.getElementById('meow-2');

        // Meow meow-active meow-active meow-active meow-active
        function startMeowing() {
            meow1.classList.add('meow-active');
            // transition transition meow-active meow-active
            setTimeout(() => {
                meow2.classList.add('meow-active');
            }, 800); 
        }

        // Meow none none none
        function stopMeowing() {
            meow1.classList.remove('meow-active');
            meow2.classList.remove('meow-active');
        }

        // Meow
        function resetInteraction() {
            // transition transition meow-active meow-active
            stopMeowing();

            // Meow 4 Meow
            clearTimeout(meowTimeout);
            meowTimeout = setTimeout(startMeowing, 4000); 
        }

        // setup التفاعل الحقيقي (رصد أي نشاط) setup
        function setupInteractionSystem() {
            resetInteraction(); // resetInteraction
            
            // transition transition Meow Meow Meow Meow
            window.addEventListener('mousemove', resetInteraction);
            window.addEventListener('touchstart', resetInteraction);
            window.addEventListener('keydown', resetInteraction);
            
            // input-box input-box setup setup setup setup
            const inputBox = document.getElementById('nickname-input');
            inputBox.addEventListener('input', resetInteraction);
        }

        // Meow Meow Meow Meow
        function cleanupInteractionSystem() {
            stopMeowing();
            clearTimeout(meowTimeout);
            window.removeEventListener('mousemove', resetInteraction);
            window.removeEventListener('touchstart', resetInteraction);
            window.removeEventListener('keydown', resetInteraction);
        }


        // ==================== 🎮 منطق سير عمل اللعبة المصغرة ====================
        
        function goToQuestion() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'flex';
            setCatThinking();
            
            // setup setup setup setup setup
            setupInteractionSystem(); 
            
            document.getElementById('nickname-input').focus();
        }

        // input-box input-box input-box input-box
        function checkInput(value) {
            const trimmedVal = value.trim();
            const msgBox = document.getElementById('msg-box');

            if (trimmedVal === "") {
                setCatThinking();
                msgBox.innerText = "";
                return;
            }

            // 1. 😅
            const arabicPattern = /[\u0600-\u06FF]/;
            if (arabicPattern.test(trimmedVal)) {
                setCatEmbarrassed();
                msgBox.innerText = "Please use English only! 😅";
                return;
            }

            // 2. ("Yosi" "yosi")
            if (trimmedVal.toLowerCase() === "yosi") {
                // setup cleanup cleanup cleanup cleanup
                cleanupInteractionSystem(); 

                setCatSuccess();
                msgBox.style.color = "#66ff99";
                msgBox.innerText = "Correct! 🙏🏼❤️";
                document.getElementById('nickname-input').blur();
                
                // escapeCatAndStartCelebration escapeCatAndStartCelebration escapeCatAndStartCelebration
                setTimeout(escapeCatAndStartCelebration, 1300);
            } else {
                // 3. 😡
                setCatAngry();
                msgBox.style.color = "#ff9966";
                msgBox.innerText = "Wrong nickname! 😡 Try again.";
            }
        }

        // animate 💨🏃‍♂️
        function escapeCatAndStartCelebration() {
            const catContainer = document.getElementById('interactive-cat');
            const smoke = document.getElementById('escape-smoke');

            smoke.classList.add('smoke-active');
            catContainer.classList.add('cat-escape');

            setTimeout(() => {
                document.getElementById('setup-panel').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('setup-panel').style.display = 'none';
                    
                    const mainCanvas = document.getElementById('main-canvas');
                    mainCanvas.style.display = 'block';
                    resizeCanvas();
                    requestAnimationFrame(animate);
                }, 400);
            }, 500);
        }


        // --- 🎈 توليد وصعود بالونات متوسطة الحجم متوزعة بشكل عشوائي فخم ---
        let balloonsFinished = false;

        function generateBalloons() {
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.05)', border: 'rgba(255, 102, 179, 0.18)', glow: 'rgba(255, 102, 179, 0.08)' },
                { bg: 'rgba(0, 229, 255, 0.05)', border: 'rgba(0, 229, 255, 0.18)', glow: 'rgba(0, 229, 255, 0.08)' },
                { bg: 'rgba(255, 215, 0, 0.05)', border: 'rgba(255, 215, 0, 0.18)', glow: 'rgba(255, 215, 0, 0.08)' },
                { bg: 'rgba(255, 255, 255, 0.03)', border: 'rgba(255, 255, 255, 0.12)', glow: 'rgba(255, 255, 255, 0.03)' }
            ];

            const totalBalloons = 14;
            let loadedBalloons = 0;

            for (let i = 0; i < totalBalloons; i++) {
                const b = document.createElement('div');
                b.className = 'balloon'; 
                
                b.style.left = (Math.random() * 84 + 8) + 'vw';
                const delay = Math.random() * 3.5;
                const duration = Math.random() * 4 + 11;
                
                b.style.animationDelay = delay + 's'; 
                b.style.animationDuration = duration + 's'; 
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.2px solid ${theme.border}`;
                b.style.boxShadow = `0 0 10px ${theme.glow}`;
                
                b.addEventListener('animationend', () => {
                    loadedBalloons++;
                    if (loadedBalloons >= totalBalloons) {
                        balloonsFinished = true;
                    }
                });

                document.body.appendChild(b);
            }
        }

        // --- 🎆 نظام الألعاب النارية اللامعة الفخمة (Sparkling Sparkles) ---
        const particles = [];
        const fireworkColors = ['#ffd700', '#ff66b3', '#00e5ff', '#ffffff', '#fff0fa'];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                
                this.speed = Math.random() * 1.5 + 0.5; 
                this.gravity = 0.015;
                this.opacity = 1;
                this.decay = Math.random() * 0.005 + 0.004; 
                this.radius = Math.random() * 2 + 0.8;
                
                this.sparkleFreq = Math.random() * 0.15 + 0.05; 
                this.sparklePhase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
                this.sparklePhase += this.sparkleFreq;
            }
            draw() {
                ctx.save();
                const sparkle = (Math.sin(this.sparklePhase) * 0.5 + 0.5) * this.opacity;
                ctx.globalAlpha = Math.max(0, sparkle);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            if (!balloonsFinished) {
                for (let i = 0; i < 40; i++) {
                    particles.push(new Particle(x, y));
                }
            }
        }

        // --- ⏳ نظام التحريك وميقات التداخل الاحتفالي ---
        let startTime = null;
        let showCelebration = false;
        let textOpacity = 0;
        let fireworkTimers = [];

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            const wDpr = canvas.width / (window.devicePixelRatio || 1);
            const hDpr = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, wDpr, hDpr);

            let p1 = 0, p2 = 0, p3 = 0;

            if (elapsed < 5500) {
                p1 = (elapsed / 5500) * 628;
            } else {
                p1 = 628;
            }

            if (elapsed >= 5500 && elapsed < 11000) {
                p2 = ((elapsed - 5500) / 5500) * 628;
            } else if (elapsed >= 11000) {
                p2 = 628;
            }

            if (elapsed >= 11000 && elapsed < 16500) {
                p3 = ((elapsed - 11000) / 5500) * 628;
            } else if (elapsed >= 16500) {
                p3 = 628;
                if (!showCelebration) {
                    showCelebration = true;
                    triggerCelebrationEvents();
                }
            }

            if (p1 > 0) drawHeart(5.8, p1);   
            if (p2 > 0) drawHeart(8.0, p2);   
            if (p3 > 0) drawHeart(10.2, p3);  

            if (showCelebration) {
                if (textOpacity < 1) textOpacity += 0.02; 
                ctx.save();
                ctx.globalAlpha = textOpacity;
                ctx.textAlign = "center";
                ctx.font = "bold 28px Arial"; 
                ctx.fillStyle = "#fff0fa";
                ctx.shadowBlur = 25;
                ctx.shadowColor = "#ff66cc";

                ctx.fillText(
                    "Happy Birthday To Yosi 🎉",
                    wDpr / 2,
                    hDpr / 2 - 180 
                );
                ctx.restore();
            }

            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        // --- 🎇 إطلاق المفرقعات والبالونات بعد هروب القط ---
        function triggerCelebrationEvents() {
            const wDpr = canvas.width / (window.devicePixelRatio || 1);
            const hDpr = canvas.height / (window.devicePixelRatio || 1);

            generateBalloons();

            function startContinuousFireworks() {
                if (balloonsFinished) return;

                triggerExplosion(wDpr * 0.25, hDpr * 0.26);

                let t1 = setTimeout(() => {
                    if (!balloonsFinished) triggerExplosion(wDpr * 0.75, hDpr * 0.22);
                }, 1500);

                let t2 = setTimeout(() => {
                    if (!balloonsFinished) triggerExplosion(wDpr * 0.5, hDpr * 0.15);
                }, 3000);

                fireworkTimers.push(t1, t2);

                let loopTimer = setTimeout(() => {
                    startContinuousFireworks();
                }, 4500);
                
                fireworkTimers.push(loopTimer);
            }

            startContinuousFireworks();

            const checkInterval = setInterval(() => {
                if (balloonsFinished) {
                    clearInterval(checkInterval);
                    fireworkTimers.forEach(t => clearTimeout(t));
                }
            }, 100);
        }

    </script>
