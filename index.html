<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية عميقة فخمة */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* دفع العناصر للأعلى والمنتصف */
            background: radial-gradient(circle at center, #061124 0%, #020610 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم الرئيسية */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 10;
            padding-top: 3vh; /* حشو علوي لرفع العناصر للأعلى */
            box-sizing: border-box;
        }

        /* 🎨 كانفاس الرسم الخاص بالقلوب والألعاب النارية والتهنئة */
        #main-canvas {
            width: 100%;
            height: 100%;
            max-height: 85vh;
            display: block;
            background: transparent;
            pointer-events: none;
        }

        /* 🎈 البالونات البيضاوية الشفافة الفخمة (تظهر فوراً وتصعد ببطء) */
        .balloon {
            position: absolute;
            width: 42px;
            height: 56px;
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            bottom: -100px;
            z-index: 2;
            animation: floatUpSlowly 14s linear forwards; /* صعود بطيء جداً وهادئ */
        }

        /* عصا البالونة الشفافة */
        .balloon::after {
            content: "";
            position: absolute;
            width: 1.2px;
            height: 30px;
            background: rgba(255, 255, 255, 0.15);
            bottom: -30px;
            left: calc(50% - 0.6px);
        }

        /* حركة صعود هادئة وبطيئة جداً */
        @keyframes floatUpSlowly {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-125vh) rotate(10deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🎨 كانفاس موحد للرسم لضمان الدقة العالية والتزامن -->
        <canvas id="main-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');

        // الحفاظ على دقة الرسم العالية للأجهزة الذكية والكمبيوتر
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 💗 دالة حساب إحداثيات نقاط القلب الخاصة بك
        function heartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)
            };
        }

        // 💗 دالة رسم القلب مع رفع الإحداثيات للأعلى
        function drawHeart(scale, points) {
            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                let a = (i / 628) * Math.PI * 2; // لتوزيع الرسم بالتساوي على المحيط بالكامل
                let p = heartPoint(a);

                // مركز القلوب مرفوع للأعلى (+10) بشكل متناسق وممتاز
                let x = (canvas.width / (window.devicePixelRatio || 1)) / 2 + p.x * scale;
                let y = (canvas.height / (window.devicePixelRatio || 1)) / 2 - p.y * scale + 10;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.strokeStyle = "#ff66cc";
            ctx.lineWidth = 3.5;
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff66cc";
            ctx.stroke();
            ctx.shadowBlur = 0; // تنظيف الـ Shadow
        }

        // --- 🎈 توليد وصعود بالونات متوسطة الحجم متوزعة بشكل عشوائي فخم ---
        let balloonsFinished = false;

        function generateBalloons() {
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.05)', border: 'rgba(255, 102, 179, 0.18)', glow: 'rgba(255, 102, 179, 0.08)' },
                { bg: 'rgba(0, 229, 255, 0.05)', border: 'rgba(0, 229, 255, 0.18)', glow: 'rgba(0, 229, 255, 0.08)' },
                { bg: 'rgba(255, 215, 0, 0.05)', border: 'rgba(255, 215, 0, 0.18)', glow: 'rgba(255, 215, 0, 0.08)' },
                { bg: 'rgba(255, 255, 255, 0.03)', border: 'rgba(255, 255, 255, 0.12)', glow: 'rgba(255, 255, 255, 0.03)' }
            ];

            const totalBalloons = 14;
            let loadedBalloons = 0;

            for (let i = 0; i < totalBalloons; i++) {
                const b = document.createElement('div');
                b.className = 'balloon'; 
                
                b.style.left = (Math.random() * 84 + 8) + 'vw';
                const delay = Math.random() * 3.5;
                const duration = Math.random() * 4 + 11;
                
                b.style.animationDelay = delay + 's'; 
                b.style.animationDuration = duration + 's'; 
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.2px solid ${theme.border}`;
                b.style.boxShadow = `0 0 10px ${theme.glow}`;
                
                // مراقبة نهاية حركة كل بالونة لتحديد وقت انتهاء البالونات بالكامل بدقة
                b.addEventListener('animationend', () => {
                    loadedBalloons++;
                    if (loadedBalloons >= totalBalloons) {
                        balloonsFinished = true; // الإعلان عن انتهاء البالونات بالكامل
                    }
                });

                document.body.appendChild(b);
            }
        }

        // --- 🎆 نظام الألعاب النارية اللامعة (Sparkling Sparkles) مدمج داخل الكانفاس ---
        const particles = [];
        const fireworkColors = ['#ffd700', '#ff66b3', '#00e5ff', '#ffffff', '#fff0fa'];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                
                // سرعة انفجار بطيئة وناعمة
                this.speed = Math.random() * 1.5 + 0.5; 
                this.gravity = 0.015; // تقليل الجاذبية لتبدو الجزيئات عائمة وخفيفة
                this.opacity = 1;
                this.decay = Math.random() * 0.004 + 0.003; // تدوم أطول لتستمر طويلاً
                this.radius = Math.random() * 2 + 0.8;
                
                // متغيرات مخصصة لإنتاج تأثير اللمعان والبريق (Sparkle)
                this.sparkleFreq = Math.random() * 0.15 + 0.05; 
                this.sparklePhase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
                this.sparklePhase += this.sparkleFreq;
            }
            draw() {
                ctx.save();
                // حساب اللمعان والبريق العشوائي بدون نيون (وميض حاد وسريع مثل النجوم اللامعة)
                const sparkle = (Math.sin(this.sparklePhase) * 0.5 + 0.5) * this.opacity;
                ctx.globalAlpha = sparkle;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            // نطلق كميات مستمرة طالما أن البالونات لم تنتهِ بعد
            if (!balloonsFinished) {
                for (let i = 0; i < 40; i++) {
                    particles.push(new Particle(x, y));
                }
            }
        }

        // --- ⏳ نظام التحريك والمؤقتات المتقاطعة ---
        let startTime = null;
        const totalDrawingDuration = 16500; // 16.5 ثانية لرسم الـ 3 قلوب بالكامل بالتساوي
        let showCelebration = false;
        let textOpacity = 0;
        let fireworkTimers = [];

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            // تنظيف الكانفاس في كل إطار
            const wDpr = canvas.width / (window.devicePixelRatio || 1);
            const hDpr = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, wDpr, hDpr);

            // تحديد حالة رسم كل قلب (العدد الأقصى للنقاط = 628 لعمل دورة كاملة)
            let p1 = 0, p2 = 0, p3 = 0;

            // 1. القلب الأول (الداخلي الصغير) - يرسم خلال أول 5.5 ثوانٍ
            if (elapsed < 5500) {
                p1 = (elapsed / 5500) * 628;
            } else {
                p1 = 628;
            }

            // 2. القلب الثاني (الأوسط) - يرسم من الثانية 5.5 إلى 11
            if (elapsed >= 5500 && elapsed < 11000) {
                p2 = ((elapsed - 5500) / 5500) * 628;
            } else if (elapsed >= 11000) {
                p2 = 628;
            }

            // 3. القلب الثالث (الخارجي الكبير) - يرسم من الثانية 11 إلى 16.5
            if (elapsed >= 11000 && elapsed < 16500) {
                p3 = ((elapsed - 11000) / 5500) * 628;
            } else if (elapsed >= 16500) {
                p3 = 628;
                if (!showCelebration) {
                    showCelebration = true;
                    triggerCelebrationEvents();
                }
            }

            // رسم القلوب بالترتيب والنسب الدقيقة المتداخلة المرفوعة للأعلى
            if (p1 > 0) drawHeart(5.8, p1);   // القلب الصغير
            if (p2 > 0) drawHeart(8.0, p2);   // القلب الوسط
            if (p3 > 0) drawHeart(10.2, p3);  // القلب الكبير

            // رسم نص التهنئة بمسافة قريبة جداً فوق القلب المرتفع (تم تصغير الخط درجتين ليصبح 28px)
            if (showCelebration) {
                if (textOpacity < 1) textOpacity += 0.02; // ظهور تدريجي ناعم ومبهر
                ctx.save();
                ctx.globalAlpha = textOpacity;
                ctx.textAlign = "center";
                ctx.font = "bold 28px Arial"; // تم التصغير درجتين من 30px إلى 28px بدقة
                ctx.fillStyle = "#fff0fa";
                ctx.shadowBlur = 25;
                ctx.shadowColor = "#ff66cc";

                ctx.fillText(
                    "Happy Birthday To Yosi 🎉",
                    wDpr / 2,
                    hDpr / 2 - 180 
                );
                ctx.restore();
            }

            // تحديث ورسم الألعاب النارية (وتتوقف تماماً عن الإنشاء والرسم فور انتهاء البالونات)
            particles.forEach((p, idx) => {
                if (p.opacity > 0 && !balloonsFinished) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        // تشغيل نظام التحريك عند تحميل الصفحة
        requestAnimationFrame(animate);

        // --- 🎇 أحداث الاحتفال فور انتهاء رسم القلوب بالكامل (عند الثانية 16.5) ---
        function triggerCelebrationEvents() {
            const wDpr = canvas.width / (window.devicePixelRatio || 1);
            const hDpr = canvas.height / (window.devicePixelRatio || 1);

            // 1. إطلاق البالونات (14 بالونة) فوراً لتصعد بنعومة وهدوء 🎈
            generateBalloons();

            // دالة مساعدة لتكرار الإطلاقات اللامعة الهادئة طالما البالونات لم تنتهِ
            function startContinuousFireworks() {
                if (balloonsFinished) return;

                // الانفجارات الثلاثة الأصلية المتتابعة (الدفعة الأولى)
                triggerExplosion(wDpr * 0.25, hDpr * 0.26); // يسار

                let t1 = setTimeout(() => {
                    triggerExplosion(wDpr * 0.75, hDpr * 0.22); // يمين
                }, 1500);

                let t2 = setTimeout(() => {
                    triggerExplosion(wDpr * 0.5, hDpr * 0.15); // منتصف أعلى
                }, 3000);

                fireworkTimers.push(t1, t2);

                // إعادة تكرار الدورة طالما البالونات لا زالت صاعدة وموجودة في الشاشة
                let loopTimer = setTimeout(() => {
                    startContinuousFireworks();
                }, 4500);
                
                fireworkTimers.push(loopTimer);
            }

            // بدء تكرار إطلاق الطراطيع اللامعة
            startContinuousFireworks();

            // مراقبة انتهاء البالونات لإيقاف كل الموقتات وتطهير الشاشة فوراً
            const checkInterval = setInterval(() => {
                if (balloonsFinished) {
                    clearInterval(checkInterval);
                    // إلغاء أي انطلاق معلق للطراطيع
                    fireworkTimers.forEach(t => clearTimeout(t));
                    particles.length = 0; // تنظيف الكانفاس فوراً من بقايا الجسيمات تزامناً مع اختفاء آخر بالونة
                }
            }, 100);
        }

    </script>
</body>
</html>
