<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function heartPoint(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    };
}

function drawHeart(scale, color, progress){
    ctx.beginPath();

    let max = Math.floor(progress * 628);

    for(let i=0;i<=max;i++){
        let a=i/100;
        let p=heartPoint(a);

        let x=canvas.width/2+p.x*scale;
        let y=canvas.height/2-p.y*scale;

        if(i===0)
            ctx.moveTo(x,y);
        else
            ctx.lineTo(x,y);
    }

    ctx.strokeStyle=color;
    ctx.lineWidth=3;
    ctx.stroke();
}

let progress = 0;
let stage = 0;

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(stage===0){
        progress += 0.01;
        drawHeart(8,"#ff66b2",progress);

        if(progress>=1){
            stage=1;
            progress=0;
        }

    }else if(stage===1){

        drawHeart(8,"#ff66b2",1);

        progress += 0.01;
        drawHeart(12,"#ff66b2",progress);

        if(progress>=1){
            stage=2;
            progress=0;
        }

    }else if(stage===2){

        drawHeart(8,"#ff66b2",1);
        drawHeart(12,"#ff66b2",1);

        progress += 0.01;
        drawHeart(16,"#ff66b2",progress);

        if(progress>=1){
            stage=3;
        }

    }else{

        drawHeart(8,"#ff66b2",1);
        drawHeart(12,"#ff66b2",1);
        drawHeart(16,"#ff66b2",1);

        ctx.textAlign="center";
        ctx.fillStyle="#ffb3d1";
        ctx.font="italic 22px Arial";
        ctx.fillText("Happy Birthday to yosi",canvas.width/2,canvas.height/2+20);
    }

    requestAnimationFrame(animate);
}

animate();
</script>
