<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Yosi! 🎉</title>
  <style>
    /* 🌌 خلفية ليلية بتدرج ألوان يناسب عيد الميلاد */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: radial-gradient(circle at center, #1b0a2a 0%, #08020f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
    }

    /* 🎂 عبارة Happy Birthday مع تأثير نيون متوهج */
    .birthday-text {
      font-size: 2.5rem;
      font-weight: bold;
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
      z-index: 10;
      text-shadow: 
        0 0 5px #fff,
        0 0 10px #ff007f,
        0 0 20px #ff007f,
        0 0 40px #ff007f,
        0 0 80px #ff007f;
      animation: neonPulse 1.5s infinite alternate;
    }

    @keyframes neonPulse {
      from {
        text-shadow: 0 0 5px #fff, 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
      }
      to {
        text-shadow: 0 0 10px #fff, 0 0 20px #ff00aa, 0 0 30px #ff00aa, 0 0 60px #ff00aa;
      }
    }

    /* حاوية العناصر المركزية */
    .container {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 5;
    }

    /* 💗 حاوية رسم القلب تدريجياً بالتأثير النيوني واللمّاع */
    .heart-svg {
      width: 280px;
      height: 280px;
      filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.9)) drop-shadow(0 0 30px rgba(255, 20, 147, 0.6));
      animation: heartbeat 1.2s infinite ease-in-out alternate;
    }

    /* رسم القلب تدريجياً باستخدام الـ SVG Stroke */
    .heart-path {
      fill: none;
      stroke: #ff1493;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawHeart 4s ease-out forwards;
    }

    /* أنيميشن الرسم التدريجي للقلب */
    @keyframes drawHeart {
      to {
        stroke-dashoffset: 0;
        fill: rgba(255, 20, 147, 0.15); /* لمسة خفيفة داخلية */
      }
    }

    /* نبض القلب بعد اكتماله ليعطي إحساساً باللمعان والحياة */
    @keyframes heartbeat {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }

    /* 🎈 البالونات شفافة جداً */
    .balloon {
      position: absolute;
      bottom: -150px;
      width: 50px;
      height: 65px;
      background: rgba(255, 255, 255, 0.08); /* شفافية عالية جداً */
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      z-index: 2;
      animation: floatUp 12s linear infinite;
    }

    /* خيط البالونة الشفاف */
    .balloon::after {
      content: "";
      position: absolute;
      bottom: -20px;
      left: 50%;
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.15);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) translateX(50px) rotate(10deg);
        opacity: 0;
      }
    }

    /* 🎆 حاوية الألعاب النارية */
    #canvas-fireworks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* 📱 التوافق مع الشاشات المختلفة (Responsive) */
    @media (max-width: 768px) {
      .birthday-text {
        font-size: 2rem;
        padding: 0 15px;
      }
      .heart-svg {
        width: 220px;
        height: 220px;
      }
    }

    @media (max-width: 480px) {
      .birthday-text {
        font-size: 1.6rem;
      }
      .heart-svg {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>

  <!-- 🎆 كانفاس لتأثيرات الألعاب النارية الرائعة -->
  <canvas id="canvas-fireworks"></canvas>

  <div class="container">
    <!-- 🎂 النص المتوهج بالنيون -->
    <h1 class="birthday-text">🎂 Happy Birthday to yosi 🎉</h1>

    <!-- 💗 القلب الذي يُرسم تدريجياً وبشكل نيون ولمّاع -->
    <svg class="heart-svg" viewBox="0 0 32 29.6">
      <path class="heart-path" d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
      c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
    </svg>
  </div>

  <script>
    // --- 🎈 إنشاء بالونات شفافة جداً ومتحركة عشوائياً ---
    function createBalloons() {
      const colors = [
        'rgba(255, 99, 132, 0.08)',
        'rgba(54, 162, 235, 0.08)',
        'rgba(255, 206, 86, 0.08)',
        'rgba(75, 192, 192, 0.08)',
        'rgba(153, 102, 255, 0.08)'
      ];
      const borders = [
        'rgba(255, 99, 132, 0.3)',
        'rgba(54, 162, 235, 0.3)',
        'rgba(255, 206, 86, 0.3)',
        'rgba(75, 192, 192, 0.3)',
        'rgba(153, 102, 255, 0.3)'
      ];

      for (let i = 0; i < 15; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        
        // توزيع عشوائي متباعد
        balloon.style.left = Math.random() * 90 + 'vw';
        balloon.style.animationDelay = Math.random() * 8 + 's';
        
        // ألوان خفيفة جداً ومتنوعة مع الحفاظ على الشفافية العالية
        const randomColorIndex = Math.floor(Math.random() * colors.length);
        balloon.style.backgroundColor = colors[randomColorIndex];
        balloon.style.borderColor = borders[randomColorIndex];
        
        document.body.appendChild(balloon);
      }
    }
    createBalloons();

    // --- 🎆 الألعاب النارية (تنفجر مرتين فقط وتتوقف) ---
    const canvas = document.getElementById('canvas-fireworks');
    const ctx = canvas.getContext('2d');

    // ضبط حجم الكانفاس ليكون متجاوباً
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // فئة جزيئات الألعاب النارية
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 5 + 2;
        this.velocity = {
          x: Math.cos(this.angle) * this.speed,
          y: Math.sin(this.angle) * this.speed
        };
        this.gravity = 0.05;
        this.opacity = 1;
        this.decay = Math.random() * 0.015 + 0.015;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        // تأثير توهج نيون لجزيئات الألعاب النارية
        ctx.shadowBlur = 8;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }

      update() {
        this.velocity.y += this.gravity;
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.opacity -= this.decay;
      }
    }

    let particles = [];
    const colors = ['#ff007f', '#ff00aa', '#39ff14', '#00e5ff', '#ffff00'];
    let explosionCount = 0;
    const maxExplosions = 2; // تنفجر مرتين فقط!
    let active = true;

    function explode(x, y) {
      if (explosionCount >= maxExplosions) return;
      explosionCount++;
      
      const numParticles = 80;
      const color = colors[Math.floor(Math.random() * colors.length)];
      for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    // إطلاق الإنفجار الأول بعد ثانية، والثاني بعد ثانيتين
    setTimeout(() => {
      explode(window.innerWidth * 0.3, window.innerHeight * 0.4);
    }, 1000);

    setTimeout(() => {
      explode(window.innerWidth * 0.7, window.innerHeight * 0.35);
    }, 2200);

    // حلقة الأنيميشن لتحديث الجزيئات ورسمها
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach((particle, index) => {
        if (particle.opacity > 0) {
          particle.update();
          particle.draw();
        } else {
          particles.splice(index, 1);
        }
      });

      // إيقاف المعالجة البرمجية عند انتهاء الانفجارات وتلاشي جميع جزيئاتها للحفاظ على أداء الجهاز
      if (explosionCount >= maxExplosions && particles.length === 0) {
        active = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      if (active) {
        requestAnimationFrame(animate);
      }
    }
    
    animate();
  </script>
</body>
</html>
