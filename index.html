<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(#12002b,#001a33);
    overflow:hidden;
}

canvas{
    background:transparent;
}

</style>

</head>

<body>

<canvas id="canvas" width="700" height="750"></canvas>


<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");


function heartPoint(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    };
}



const hearts=[
    {scale:8},
    {scale:12},
    {scale:16}
];


let currentHeart=0;
let currentPoint=0;

let fireworks=[];
let balloons=[];



function drawHeart(scale,points){

    ctx.beginPath();

    for(let i=0;i<=points;i++){

        let a=i/100;
        let p=heartPoint(a);

        let x=canvas.width/2+p.x*scale;
        let y=canvas.height/2-p.y*scale;


        if(i===0)
            ctx.moveTo(x,y);
        else
            ctx.lineTo(x,y);

    }

    ctx.strokeStyle="#ff66cc";
    ctx.lineWidth=4;
    ctx.shadowBlur=15;
    ctx.shadowColor="#ff66cc";
    ctx.stroke();

    ctx.shadowBlur=0;
}



function createFirework(){

    let x=Math.random()*canvas.width;
    let y=Math.random()*300;

    for(let i=0;i<40;i++){

        fireworks.push({

            x:x,
            y:y,
            dx:(Math.random()-0.5)*8,
            dy:(Math.random()-0.5)*8,
            life:60

        });

    }

}



function drawFireworks(){

    fireworks.forEach((f,index)=>{

        ctx.beginPath();

        ctx.arc(f.x,f.y,3,0,Math.PI*2);

        ctx.fillStyle="#ffd700";
        ctx.fill();


        f.x+=f.dx;
        f.y+=f.dy;
        f.life--;


        if(f.life<=0)
            fireworks.splice(index,1);

    });

}



function createBalloons(){

    for(let i=0;i<8;i++){

        balloons.push({

            x:Math.random()*700,
            y:800,
            size:20+Math.random()*20,
            speed:1+Math.random()*2

        });

    }

}


function drawBalloons(){

    balloons.forEach(b=>{

        ctx.beginPath();

        ctx.arc(
            b.x,
            b.y,
            b.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle="#ff66b2";
        ctx.fill();


        b.y-=b.speed;


    });

}



function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );


    for(let i=0;i<currentHeart;i++){
        drawHeart(
            hearts[i].scale,
            628
        );
    }



    if(currentHeart<hearts.length){


        drawHeart(
            hearts[currentHeart].scale,
            currentPoint
        );


        currentPoint+=2;


        if(currentPoint>=628){

            currentPoint=0;
            currentHeart++;

        }


    }else{


        drawBalloons();
        drawFireworks();


        ctx.textAlign="center";

        ctx.fillStyle="#fff0fa";

        ctx.font="bold 35px Arial";

        ctx.shadowBlur=20;
        ctx.shadowColor="#ff66cc";


        ctx.fillText(
            "🎂 Happy Birthday to yosi 🎂",
            canvas.width/2,
            canvas.height/2+30
        );


        if(fireworks.length<150)
            createFirework();


        if(balloons.length===0)
            createBalloons();


    }


    requestAnimationFrame(animate);

}



animate();


</script>

</body>
</html>
