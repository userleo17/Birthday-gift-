<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية كحلية عميقة وفخمة */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* لدفع العناصر للأعلى */
            align-items: center;
            background: radial-gradient(circle at center, #061124 0%, #020610 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم المركزية للتحكم بالترتيب والأبعاد */
        .container {
            position: relative;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding-top: 5vh; /* لدفع العناصر للجزء العلوي من الشاشة */
            box-sizing: border-box;
        }

        /* 🎂 عبارة التهنئة - فوق القلب مباشرة بمسافة قريبة جداً وبسيطة */
        .birthday-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            opacity: 0; /* مخفية وتبدأ بالظهور فور انتهاء الرسم */
            margin-bottom: 5px; /* مسافة قريبة جداً من القلب */
            transition: opacity 1s ease-out;
        }

        /* تفعيل وهج النيون للتهنئة */
        .birthday-text.show {
            opacity: 1;
            text-shadow: 
                0 0 10px #ff66b3,
                0 0 20px #ff3399,
                0 0 35px #ff3399;
        }

        /* 💗 حاوية القلوب المتداخلة */
        .hearts-wrapper {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
        }

        .hearts-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: visible !important; /* لانتشار توهج النيون بدون أي قص */
        }

        /* ستايل مسار القلب المطابق تماماً للصورة بنسبة 100% */
        .heart-path {
            fill: none;
            stroke: #ff66b3; 
            stroke-width: 1.2px; /* نحافة فائقة وفخمة */
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
            
            /* توهج نيون طبيعي وناعم */
            filter: drop-shadow(0 0 6px rgba(255, 102, 179, 0.9)) 
                    drop-shadow(0 0 18px rgba(255, 51, 153, 0.6))
                    drop-shadow(0 0 28px rgba(255, 51, 153, 0.3));
            
            /* لإحداث تأثير الرسم التدريجي البطيء جداً */
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
        }

        /* ⏱️ تراتبية زمنية بطيئة جداً لرسم القلوب من الداخل للخارج (الإجمالي 16.5 ثانية) */
        
        /* 1. القلب الصغير الداخلي (يستغرق 5.5 ثوانٍ) */
        .heart-inner {
            transform-origin: 50px 53px;
            transform: scale(0.55);
            animation: drawVerySlow 5.5s linear 0.5s forwards;
        }

        /* 2. القلب الأوسط (يبدأ عند الثانية 6 ويستغرق 5.5 ثوانٍ) */
        .heart-middle {
            transform-origin: 50px 53px;
            transform: scale(0.8);
            animation: drawVerySlow 5.5s linear 6s forwards;
        }

        /* 3. القلب الكبير الخارجي (يبدأ عند الثانية 11.5 ويستغرق 5.5 ثوانٍ) */
        .heart-outer {
            transform-origin: 50px 53px;
            transform: scale(1.05);
            animation: drawVerySlow 5.5s linear 11.5s forwards;
        }

        @keyframes drawVerySlow {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 🎈 البالونات البيضاوية الشفافة (تبدأ بالصعود ببطء شديد منذ بداية فتح الصفحة) */
        .balloon {
            position: absolute;
            width: 44px;  /* شكل بيضاوي مثالي */
            height: 58px; 
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            bottom: -100px;
            z-index: 2;
            animation: floatUpSlowly 22s linear infinite; /* صعود هادئ وبطيء جداً متناسق مع الرسم */
        }

        /* عصا البالونة الشفافة */
        .balloon::after {
            content: "";
            position: absolute;
            width: 1.2px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            bottom: -30px;
            left: calc(50% - 0.6px);
        }

        @keyframes floatUpSlowly {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(10deg); opacity: 0; }
        }

        /* 🎆 حاوية الألعاب النارية */
        #canvas-fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 📱 متجاوب تماماً مع جميع الهواتف والأجهزة وشاشات الكمبيوتر */
        @media (max-width: 600px) {
            .birthday-text {
                font-size: 1.5rem;
            }
            .hearts-wrapper {
                width: 290px;
                height: 290px;
            }
        }
    </style>
</head>
<body>

    <!-- 🎆 كانفاس الألعاب النارية -->
    <canvas id="canvas-fireworks"></canvas>

    <div class="container">
        <!-- 🎂 عبارة التهنئة (تظهر بعد 17 ثانية فوق القلوب مباشرة) -->
        <h1 id="bday-title" class="birthday-text">Happy Birthday to yosi 🎉</h1>

        <!-- 💗 القلوب المتداخلة الثلاثة المطابقة تماماً للصورة -->
        <div class="hearts-wrapper">
            <svg class="hearts-svg" viewBox="0 0 100 100">
                <!-- 
                     إحداثيات القلب المعدلة بنسبة 100% لتطابق الصورة المرفقة:
                     - يبدأ مسار الرسم من النقطة السفلية الحادة والمدببة (50, 88).
                     - يتجه للأعلى ليرسم انحناءً دائرياً ممتلئاً وبارزاً لليسار.
                     - يدخل في تجويف عميق وحاد بالمنتصف عند (50, 30).
                     - يكمل الفص الأيمن الدائري المماثل والمنساب.
                     - ينحدر بنعومة فائقة ليلتقي بالأسفل عند نفس النقطة الحادة.
                -->
                <!-- القلب الصغير -->
                <path class="heart-path heart-inner" d="M 50,88 C 12,62 12,40 12,40 C 12,12 36,12 50,30 C 64,12 88,12 88,40 C 88,40 88,62 50,88 Z" />
                
                <!-- القلب الوسط -->
                <path class="heart-path heart-middle" d="M 50,88 C 12,62 12,40 12,40 C 12,12 36,12 50,30 C 64,12 88,12 88,40 C 88,40 88,62 50,88 Z" />
                
                <!-- القلب الكبير -->
                <path class="heart-path heart-outer" d="M 50,88 C 12,62 12,40 12,40 C 12,12 36,12 50,30 C 64,12 88,12 88,40 C 88,40 88,62 50,88 Z" />
            </svg>
        </div>
    </div>

    <script>
        // --- 🎈 إنشاء وصعود البالونات البيضاوية الشفافة فوراً عند التحميل وبسرعة بطيئة ---
        function generateBalloons() {
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.06)', border: 'rgba(255, 102, 179, 0.2)', glow: 'rgba(255, 102, 179, 0.1)' }, // وردي
                { bg: 'rgba(0, 229, 255, 0.06)', border: 'rgba(0, 229, 255, 0.2)', glow: 'rgba(0, 229, 255, 0.1)' },   // سماوي
                { bg: 'rgba(255, 215, 0, 0.06)', border: 'rgba(255, 215, 0, 0.2)', glow: 'rgba(255, 215, 0, 0.1)' },     // أصفر
                { bg: 'rgba(255, 255, 255, 0.04)', border: 'rgba(255, 255, 255, 0.12)', glow: 'rgba(255, 255, 255, 0.04)' } // أبيض
            ];

            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'balloon'; 
                b.style.left = Math.random() * 85 + 'vw';
                // تباعد زمني مستمر وتلقائي منذ بداية الصفحة لتبدو حركة طبيعية وبطيئة
                b.style.animationDelay = (Math.random() * 12) + 's'; 
                b.style.animationDuration = (Math.random() * 6 + 18) + 's'; // صعود هادئ يستغرق من 18 إلى 24 ثانية
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.2px solid ${theme.border}`;
                b.style.boxShadow = `0 0 10px ${theme.glow}`;
                
                document.body.appendChild(b);
            }
        }

        // --- 🎆 نظام الألعاب النارية المتناسق ---
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const fireworkColors = ['#ff66b3', '#ffd700', '#00e5ff', '#ffffff'];
        let explosions = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4.5 + 2;
                this.gravity = 0.05;
                this.opacity = 1;
                this.decay = Math.random() * 0.01 + 0.007;
                this.radius = Math.random() * 3 + 1;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            if (explosions >= 2) return;
            explosions++;
            for (let i = 0; i < 75; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function anim() {
            if (explosions >= 2 && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });
            requestAnimationFrame(anim);
        }

        // --- ⏳ التزامن والمؤقتات لضبط سير الأحداث ---
        
        // 1. تشغيل صعود البالونات فوراً من الثانية 0 وببطء
        generateBalloons();

        // 2. عند الثانية 17 (فور اكتمال رسم القلوب الثلاثة بالكامل):
        // تظهر التهنئة مباشرة فوق القلوب، تليها الألعاب النارية مرتين متتاليتين ومبهجتين.
        setTimeout(() => {
            // أ. إبراز التهنئة فجأة فوق القلب مباشرة
            document.getElementById('bday-title').classList.add('show');
            
            // ب. إطلاق الانفجار الأول للألعاب النارية
            triggerExplosion(window.innerWidth * 0.28, window.innerHeight * 0.35); 
            
            // جـ. إطلاق الانفجار الثاني للألعاب النارية بعد ثانية ونصف لإتمام العرض
            setTimeout(() => {
                triggerExplosion(window.innerWidth * 0.72, window.innerHeight * 0.28);
            }, 1500);
            
            anim();
        }, 17000); // 17 ثانية بالضبط لضمان اكتمال الرسم البطيء للقلوب

    </script>
</body>
</html>
