<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية كحلية عميقة مطابقة تماماً للصورة الثانية */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #09061c 0%, #03020a 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم المركزية ترتيب عمودي */
        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* لتوزيع النص في الأعلى والقلب في المنتصف */
            align-items: center;
            z-index: 10;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 🎂 عبارة التهنئة في الأعلى مع تأثير نيون وردي وأبيض */
        .birthday-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            text-shadow: 
                0 0 10px #ff66b3,
                0 0 20px #ff3399,
                0 0 30px #ff3399;
            margin-bottom: 20px;
        }

        /* 💗 حاوية القلوب النيون المتداخلة في المنتصف */
        .hearts-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hearts-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: visible !important; /* لمنع قص لمعة النيون */
        }

        /* ستايل مسارات القلوب النحيفة جداً والمطابقة للصورة */
        .heart-path {
            fill: none;
            stroke: #ff66b3; 
            stroke-width: 1.5px;
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
            
            /* توهج نيون قوي وناعم ثلاثي الطبقات */
            filter: drop-shadow(0 0 6px rgba(255, 102, 179, 0.9)) 
                    drop-shadow(0 0 15px rgba(255, 51, 153, 0.6))
                    drop-shadow(0 0 25px rgba(255, 51, 153, 0.3));
            
            /* أنيميشن الرسم التدريجي */
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        /* تراتبية الرسم التدريجي (يبدأ من الداخل إلى الخارج) */
        /* 1. القلب الصغير الداخلي */
        .heart-inner {
            transform-origin: 50px 53px;
            transform: scale(0.55);
            animation: drawStep 2s ease-out 0.5s forwards;
        }

        /* 2. القلب الوسط */
        .heart-middle {
            transform-origin: 50px 53px;
            transform: scale(0.8);
            animation: drawStep 2s ease-out 1.8s forwards;
        }

        /* 3. القلب الكبير الخارجي */
        .heart-outer {
            transform-origin: 50px 53px;
            transform: scale(1.05);
            animation: drawStep 2s ease-out 3s forwards;
        }

        @keyframes drawStep {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 🎈 البالونات الشفافة الدائرية مع العصا البيضاء (نفس ستايل الصورة ولكن بشفافية عالية) */
        .balloon {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%; /* دائرية تماماً مثل الصورة */
            bottom: -120px;
            z-index: 2;
            animation: floatUp 15s linear infinite;
        }

        /* العصا البيضاء للبالونة */
        .balloon::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 40px; /* عصا البالونة */
            background: rgba(255, 255, 255, 0.3); /* عصا بيضاء شبه شفافة */
            bottom: -40px;
            left: calc(50% - 1px);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(10deg); opacity: 0; }
        }

        /* 🎆 الألعاب النارية (على شكل جزيئات دائرية ملونة متناثرة مثل الصورة) */
        #canvas-fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 📱 متجاوب بالكامل مع كافة الشاشات */
        @media (max-width: 600px) {
            .birthday-text {
                font-size: 1.8rem;
            }
            .hearts-wrapper {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>

    <!-- 🎆 كانفاس الألعاب النارية (الجزيئات الملونة) -->
    <canvas id="canvas-fireworks"></canvas>

    <div class="container">
        <!-- 🎂 عبارة التهنئة أصبحت في الأعلى فوق القلب مباشرة -->
        <h1 class="birthday-text">Happy Birthday to yosi 🎉</h1>

        <!-- 💗 القلوب النحيفة المتداخلة تُرسم تدريجياً من الداخل للخارج -->
        <div class="hearts-wrapper">
            <svg class="hearts-svg" viewBox="0 0 100 106">
                <!-- القلب الصغير (الداخلي) -->
                <path class="heart-path heart-inner" d="M 50,32 C 43,18 25,18 25,45 C 25,67 50,88 50,88 C 50,88 75,67 75,45 C 75,18 57,18 50,32 Z" />
                
                <!-- القلب الوسط (الأوسط) -->
                <path class="heart-path heart-middle" d="M 50,32 C 43,18 25,18 25,45 C 25,67 50,88 50,88 C 50,88 75,67 75,45 C 75,18 57,18 50,32 Z" />
                
                <!-- القلب الكبير (الخارجي) -->
                <path class="heart-path heart-outer" d="M 50,32 C 43,18 25,18 25,45 C 25,67 50,88 50,88 C 50,88 75,67 75,45 C 75,18 57,18 50,32 Z" />
            </svg>
        </div>
    </div>

    <script>
        // --- 🎈 إنشاء بالونات ملونة دائرية وشفافة جداً مع العصا البيضاء ---
        function generateBalloons() {
            // الألوان المأخوذة من بالونات الصورة (وردي، سماوي، أصفر، أبيض) مع نسبة شفافية عالية (0.12) وتوهج خفيف
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.12)', border: 'rgba(255, 102, 179, 0.3)', glow: 'rgba(255, 102, 179, 0.2)' }, // وردي
                { bg: 'rgba(0, 229, 255, 0.12)', border: 'rgba(0, 229, 255, 0.3)', glow: 'rgba(0, 229, 255, 0.2)' },   // سماوي
                { bg: 'rgba(255, 215, 0, 0.12)', border: 'rgba(255, 215, 0, 0.3)', glow: 'rgba(255, 215, 0, 0.2)' },     // أصفر
                { bg: 'rgba(255, 255, 255, 0.08)', border: 'rgba(255, 255, 255, 0.2)', glow: 'rgba(255, 255, 255, 0.1)' } // أبيض
            ];

            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'balloon';
                
                // توزيع عشوائي متباعد وسرعات مختلفة
                b.style.left = Math.random() * 85 + 'vw';
                b.style.animationDelay = Math.random() * 10 + 's';
                b.style.animationDuration = (Math.random() * 6 + 10) + 's';
                
                // اختيار لون عشوائي شفاف وتطبيقه
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.5px solid ${theme.border}`;
                b.style.boxShadow = `0 0 15px ${theme.glow}`;
                
                document.body.appendChild(b);
            }
        }
        generateBalloons();

        // --- 🎆 الألعاب النارية (انفجار دائرى ملون ينفجر مرتين فقط ثم يتوقف بالكامل) ---
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        // ألوان الجزيئات من الصورة (وردي مبهج، أصفر ليموني، أزرق سماوي، أبيض ناصع)
        const fireworkColors = ['#ff66b3', '#ffd700', '#00e5ff', '#ffffff'];
        let explosions = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4.5 + 1.5;
                this.gravity = 0.04;
                this.opacity = 1;
                this.decay = Math.random() * 0.01 + 0.008;
                this.radius = Math.random() * 3.5 + 1.5; // أحجام مختلفة للجزيئات الدائرية لتشبه الصورة
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                // توهج الجزيئات الدائرية الملونة
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            if (explosions >= 2) return; // حد أقصى انفجارين فقط
            explosions++;
            for (let i = 0; i < 70; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function anim() {
            if (explosions >= 2 && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return; // إيقاف الأنيميشن نهائياً لتوفير موارد الجهاز
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });
            requestAnimationFrame(anim);
        }

        // الإطلاق الأول والثاني للألعاب النارية المتناسقة حول القلوب
        setTimeout(() => triggerExplosion(window.innerWidth * 0.5, window.innerHeight * 0.35), 1000); // انفجار مركزي علوي أولاً
        setTimeout(() => triggerExplosion(window.innerWidth * 0.5, window.innerHeight * 0.45), 2500); // انفجار مركزي ثاني
        
        anim();
    </script>
</body>
</html>
