<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yosi</title>
    <style>
        /* 🌌 خلفية ليلية كحلية عميقة فخمة ومريحة للعين */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #061226 0%, #020612 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* حاوية التصميم المركزية */
        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            z-index: 10;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 🎂 عبارة التهنئة في الأعلى (مخفية في البداية وتظهر بوهج نيون قوي فور انتهاء الرسم) */
        .birthday-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            opacity: 0; /* مخفية */
            margin-bottom: 10px;
            transition: opacity 0.8s ease-out;
        }

        /* تفعيل النيون للتهنئة */
        .birthday-text.show {
            opacity: 1;
            text-shadow: 
                0 0 10px #ff66b3,
                0 0 20px #ff3399,
                0 0 40px #ff3399;
        }

        /* 💗 حاوية القلوب المتداخلة ذات المركز الواحد وعمق رائع */
        .hearts-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hearts-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: visible !important; /* لانتشار توهج النيون بالكامل بدون حواف مربعة */
        }

        /* ستايل مسار القلب النحيف المتناسق والمطابق للوصف */
        .heart-path {
            fill: none;
            stroke: #ff66b3; 
            stroke-width: 1.3px; /* نحيف جداً وأنيق */
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
            
            /* توهج نيون طبيعي وناعم */
            filter: drop-shadow(0 0 6px rgba(255, 102, 179, 0.9)) 
                    drop-shadow(0 0 18px rgba(255, 51, 153, 0.6))
                    drop-shadow(0 0 28px rgba(255, 51, 153, 0.3));
            
            /* لإحداث تأثير الرسم التدريجي خطوة بخطوة */
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
        }

        /* ⏱️ تراتبية زمنية بطيئة وممتعة للرسم من الداخل للخارج بالتناوب */
        
        /* 1. القلب الصغير (الداخلي) */
        .heart-inner {
            transform-origin: 50px 50px;
            transform: scale(0.55);
            animation: drawStepByStep 3s linear 0.5s forwards;
        }

        /* 2. القلب الوسط (يبدأ فور اكتمال الصغير) */
        .heart-middle {
            transform-origin: 50px 50px;
            transform: scale(0.8);
            animation: drawStepByStep 3s linear 3.5s forwards;
        }

        /* 3. القلب الكبير (الخارجي - يبدأ بعد الوسط) */
        .heart-outer {
            transform-origin: 50px 50px;
            transform: scale(1.05);
            animation: drawStepByStep 3s linear 6.5s forwards;
        }

        /* أنيميشن محاكاة الرسم اليدوي */
        @keyframes drawStepByStep {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 🎈 البالونات البيضاوية الشفافة الفخمة */
        .balloon {
            position: absolute;
            width: 48px;  /* عرض أصغر مقارنة بالارتفاع ليعطي شكل بيضاوي */
            height: 64px; /* ارتفاع أطول للبيضاوية المثالية */
            /* انحناء خاص يجعل البالونة عريضة من الأعلى وتضيق بنعومة نحو الأسفل */
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            bottom: -120px;
            z-index: 2;
            opacity: 0;
        }

        .balloon.fly {
            animation: floatUp 12s linear infinite;
        }

        /* عصا البالونة البيضاء الشفافة المتصلة بأسفل البالونة البيضاوية */
        .balloon::after {
            content: "";
            position: absolute;
            width: 1.5px;
            height: 35px;
            background: rgba(255, 255, 255, 0.2);
            bottom: -35px;
            left: calc(50% - 0.75px);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            5% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(15deg); opacity: 0; }
        }

        /* 🎆 حاوية الألعاب النارية الملونة */
        #canvas-fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 📱 متجاوب بالكامل مع كافة الشاشات */
        @media (max-width: 600px) {
            .birthday-text {
                font-size: 1.7rem;
            }
            .hearts-wrapper {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- 🎆 كانفاس الألعاب النارية -->
    <canvas id="canvas-fireworks"></canvas>

    <div class="container">
        <!-- 🎂 عبارة التهنئة المضيئة في الأعلى (تتفعل بعد 9.5 ثانية) -->
        <h1 id="bday-title" class="birthday-text">Happy Birthday to yosi 🎉</h1>

        <!-- 💗 القلوب المتداخلة الثلاثة المرسومة بمسار احترافي يبدأ من المحيط بالترتيب -->
        <div class="hearts-wrapper">
            <svg class="hearts-svg" viewBox="0 0 100 100">
                <!-- القلب الصغير الداخلي -->
                <path class="heart-path heart-inner" d="M 18,42 C 18,22 36,12 50,28 C 64,12 82,22 82,42 C 82,64 50,88 50,88 C 50,88 18,64 18,42 Z" />
                
                <!-- القلب الأوسط -->
                <path class="heart-path heart-middle" d="M 18,42 C 18,22 36,12 50,28 C 64,12 82,22 82,42 C 82,64 50,88 50,88 C 50,88 18,64 18,42 Z" />
                
                <!-- القلب الكبير الخارجي -->
                <path class="heart-path heart-outer" d="M 18,42 C 18,22 36,12 50,28 C 64,12 82,22 82,42 C 82,64 50,88 50,88 C 50,88 18,64 18,42 Z" />
            </svg>
        </div>
    </div>

    <script>
        // --- 🎈 توليد البالونات البيضاوية الشفافة جداً ---
        function generateBalloons() {
            const colors = [
                { bg: 'rgba(255, 102, 179, 0.07)', border: 'rgba(255, 102, 179, 0.22)', glow: 'rgba(255, 102, 179, 0.12)' },
                { bg: 'rgba(0, 229, 255, 0.07)', border: 'rgba(0, 229, 255, 0.22)', glow: 'rgba(0, 229, 255, 0.12)' },
                { bg: 'rgba(255, 215, 0, 0.07)', border: 'rgba(255, 215, 0, 0.22)', glow: 'rgba(255, 215, 0, 0.12)' },
                { bg: 'rgba(255, 255, 255, 0.05)', border: 'rgba(255, 255, 255, 0.15)', glow: 'rgba(255, 255, 255, 0.05)' }
            ];

            for (let i = 0; i < 14; i++) {
                const b = document.createElement('div');
                b.className = 'balloon fly'; 
                b.style.left = Math.random() * 85 + 'vw';
                b.style.animationDelay = (Math.random() * 5) + 's'; 
                b.style.animationDuration = (Math.random() * 4 + 9) + 's';
                
                const theme = colors[Math.floor(Math.random() * colors.length)];
                b.style.backgroundColor = theme.bg;
                b.style.border = `1.5px solid ${theme.border}`;
                b.style.boxShadow = `0 0 12px ${theme.glow}`;
                
                document.body.appendChild(b);
            }
        }

        // --- 🎆 نظام الألعاب النارية (الطراطيع الملونة الدائرية) ---
        const canvas = document.getElementById('canvas-fireworks');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const fireworkColors = ['#ff66b3', '#ffd700', '#00e5ff', '#ffffff'];
        let explosions = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2.2;
                this.gravity = 0.05;
                this.opacity = 1;
                this.decay = Math.random() * 0.01 + 0.007;
                this.radius = Math.random() * 3.5 + 1.2;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.opacity -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y) {
            if (explosions >= 2) return;
            explosions++;
            for (let i = 0; i < 75; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function anim() {
            if (explosions >= 2 && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                if (p.opacity > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(idx, 1);
                }
            });
            requestAnimationFrame(anim);
        }

        // --- ⏳ التزامن بعد اكتمال رسم القلوب الثلاثة عند الثانية 9.5 ---
        setTimeout(() => {
            // 1. إبراز التهنئة فجأة بالنيون المذهل
            document.getElementById('bday-title').classList.add('show');
            
            // 2. إطلاق البالونات البيضاوية الشفافة ذات العصا لتصعد معاً في نفس الوقت
            generateBalloons();
            
            // 3. إطلاق الطراطيع (انفجارين في السماء)
            triggerExplosion(window.innerWidth * 0.28, window.innerHeight * 0.4); 
            setTimeout(() => {
                triggerExplosion(window.innerWidth * 0.72, window.innerHeight * 0.32);
            }, 1200);
            
            anim();
        }, 9500);

    </script>
</body>
</html>
